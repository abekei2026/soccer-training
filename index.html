<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>サッカーあたまトレーニング</title>
<!-- オンラインたいせんモード用: WebRTC接続をシンプルに扱うためのライブラリ(peerjs.comの無料シグナリングサーバーを利用) -->
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a6e2e;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    font-family: "Hiragino Maru Gothic ProN", "BIZ UDGothic", "Meiryo", sans-serif;
  }
  #game {
    display: block;
    width: 100%; height: 100%;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
"use strict";

// ============================================================
// サッカーあたまトレーニング - Phase 1
// フィールド描画 / プレイヤー移動(キーボード+バーチャルスティック)
// 味方AI 2人のパス回し / ボールの移動表現
// ============================================================

// ---------- 基本設定 ----------
const FIELD = {
  w: 20,          // フィールド幅(m) 論理座標
  h: 32,          // フィールド高さ(m) ゴールは y=0(上)側
  goalW: 6,       // ゴール幅
  margin: 0.5     // フィールド外周の余白(描画用、なるべく画面いっぱいに使う)
};

const PLAYER_SPEED   = 5.0;   // プレイヤー移動速度 m/s
const AI_SPEED       = 4.2;   // AI移動速度 m/s
const PASS_SPEED     = 11.0;  // パス時のボール速度 m/s
const CAPTURE_DIST   = 0.9;   // ボールを拾える距離
const KICK_COOLDOWN  = 0.45;  // パス直後に自分で拾えない時間(秒)
const TAP_RADIUS     = 3.0;   // タップでパス相手を選べる範囲(m)
const SHOOT_SPEED    = 14.0;  // シュート時のボール速度 m/s
const DF_SPEED       = 3.5;   // 敵DFの速度(プレイヤーより遅め)
const GK_SPEED       = 3.8;   // ゴールキーパーの速度(小学生でも決めやすいよう少し遅め)
const STEAL_DIST     = 0.6;   // 敵がボールを奪える距離
const INTERCEPT_DIST = 0.7;   // 敵がフリーボール/パスをカットできる距離
const JUDGE_TIME      = 5.0;  // 判断タイム(スローモーション)の長さ(秒)
const SLOWMO_SCALE    = 0.35; // 判断タイム中の時間の流れる速さ
const LANE_RISK_DIST  = 1.4;  // パスコース上でこの距離より敵が近いと「あぶない」判定
const SPACE_THRESHOLD = 3.5;  // これより敵が遠ければ「スペースで受けた」判定
const HINT_COOLDOWN     = 15000; // ヒント表示の最短間隔(ミリ秒)
const NICE_RUN_COOLDOWN = 3000;  // 「ナイスラン!」の最短間隔(ミリ秒)
const ROUND_DURATION    = 60;    // 1ラウンドの長さ(秒)

const IS_TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// 画面⇔フィールド座標変換用
// fitView = フィールド全体を画面に収める変換(れんしゅう/たいせんモード用)
// しあいモードは毎フレーム s7ApplyCamera() が view を上書きする(追従カメラ)
let view = { scale: 1, offX: 0, offY: 0 };
const fitView = { scale: 1, offX: 0, offY: 0 };

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const cw = window.innerWidth;
  const ch = window.innerHeight;
  const fw = FIELD.w + FIELD.margin * 2;
  const fh = FIELD.h + FIELD.margin * 2;
  fitView.scale = Math.min(cw / fw, ch / fh);
  fitView.offX = (cw - FIELD.w * fitView.scale) / 2;
  // 上部のHUDバー(タイトル表示)とゴールが重ならない最低限のすき間だけは確保する
  fitView.offY = Math.max(66, (ch - FIELD.h * fitView.scale) / 2);
  Object.assign(view, fitView);
}
window.addEventListener('resize', resize);
resize();

function toScreen(x, y) {
  return [view.offX + x * view.scale, view.offY + y * view.scale];
}
function toField(sx, sy) {
  return [(sx - view.offX) / view.scale, (sy - view.offY) / view.scale];
}

// ---------- 選手とボール ----------
function makePlayer(id, x, y, isUser) {
  return {
    id, x, y,
    vx: 0, vy: 0,
    fx: 0, fy: -1,        // 向いている方向
    isUser,
    team: 'blue',
    isGK: false,
    radius: 0.55,
    holdTimer: 0,         // AIがボールを持ってから経過した時間
    holdLimit: 0          // この時間が来たらパスする
  };
}

function makeDefender(id, x, y, isGK) {
  const p = makePlayer(id, x, y, false);
  p.team = 'red';
  p.isGK = isGK;
  return p;
}

const players = [
  makePlayer(0, FIELD.w / 2, FIELD.h * 0.72, true),   // プレイヤー(むらさき)
  makePlayer(1, FIELD.w * 0.25, FIELD.h * 0.5, false), // 味方AI(あお)
  makePlayer(2, FIELD.w * 0.75, FIELD.h * 0.5, false)  // 味方AI(あお)
];
const userPlayer = players[0];

// そうさモード: 'fixed'=いつも同じ選手 / followBall有効時はボールを持っている人を自動操作
const control = { followBall: false };
let controlledPlayer = userPlayer;
// オンラインたいせん(Phase 3)でゲストが操作する赤選手(ボールを持つと自動で切り替わる。controlledPlayerの赤版)
let controlledDefender = null;

const defenders = [
  makeDefender(10, FIELD.w * 0.3, 11, false),  // 敵DF(あか)
  makeDefender(11, FIELD.w * 0.7, 11, false),  // 敵DF(あか)
  makeDefender(12, FIELD.w * 0.5, 6.5, false), // 敵DF(あか)
  makeDefender(13, FIELD.w * 0.5, 1.2, true)   // ゴールキーパー(オレンジ)
];
const everyone = [...players, ...defenders];

// たいせんモード専用: 下ゴールを守る青いキーパー(れんしゅうモードでは使わない)
const blueGK = makePlayer(20, FIELD.w / 2, FIELD.h - 1.2, false);
blueGK.isGK = true;

// たいせんモードの状態
const MATCH = {
  mode: null,        // null / 'practice' / 'versus'
  duration: 120,
  timeLeft: 0,
  attacker: 'blue',  // 今どちらが攻撃中か
  state: 'play',     // 'play' / 'turnover' / 'goal'
  timer: 0,
  message: '',
  blueScore: 0,
  redScore: 0,
  difficulty: 1,     // 1(ふつう)〜5(むずかしい): あいてチームのスピード倍率
  paused: false
};

// なんいど1(ふつう=今までどおり)〜5(むずかしい)まで、あいて(赤)のスピードだけ少しずつ上げる
const DIFFICULTY_SPEED_MULT = [1.0, 1.1, 1.2, 1.3, 1.4];
function versusSpeed(team, baseSpeed) {
  return team === 'red' ? baseSpeed * DIFFICULTY_SPEED_MULT[MATCH.difficulty - 1] : baseSpeed;
}

// ============================================================
// しあいモード(7人制・フルコート) Phase 1
// フルコート描画 / ボール追従カメラ / ミニマップ /
// 攻撃側7人のフォーメーション+パス回し(守備は赤GKのみ)
// ============================================================
const S7F = { w: 40, h: 62, goalW: 8 };   // フルコートの大きさ(m)

const S7 = {
  viewLong: 36,     // 画面の長いほうの辺に映すコートの長さ(m) = カメラのズーム基準
  cam: { x: S7F.w / 2, y: S7F.h / 2 },
  state: 'play',    // 'play' / 'goal'
  timer: 0,
  message: '',
  score: 0,          // 青(あなた)の得点
  redScore: 0,       // 赤(あいて)の得点
  attacker: 'blue',  // 今ボールを保持しているチーム(攻守の切り替え)
  nextKickoff: 'blue',
  stealCooldown: 0   // 奪い合いの直後にすぐ奪い返せないようにする
};

function s7MakeBlue(id, x, y, role, minY, maxY, pushDist) {
  const p = makePlayer(id, x, y, false);
  p.role = role;         // 'DF' / 'MF' / 'FW'
  p.baseX = x; p.baseY = y;
  p.minY = minY; p.maxY = maxY;   // 役割ごとの担当範囲(縦方向)
  p.pushDist = pushDist;          // 攻撃が深いときに前へ押し上がる最大距離(m)
  return p;
}

// 青: フィールドプレーヤー7人(DF2/MF3/FW2) + GK = 8人制。攻めるゴールは上(y=0)
const s7Blue = [
  s7MakeBlue(30, S7F.w * 0.28, S7F.h * 0.80, 'DF', S7F.h * 0.60, S7F.h * 0.95, 16),
  s7MakeBlue(31, S7F.w * 0.72, S7F.h * 0.80, 'DF', S7F.h * 0.60, S7F.h * 0.95, 16),
  s7MakeBlue(32, S7F.w * 0.28, S7F.h * 0.55, 'MF', S7F.h * 0.32, S7F.h * 0.78, 12),
  s7MakeBlue(33, S7F.w * 0.72, S7F.h * 0.55, 'MF', S7F.h * 0.32, S7F.h * 0.78, 12),
  s7MakeBlue(34, S7F.w * 0.32, S7F.h * 0.30, 'FW', S7F.h * 0.06, S7F.h * 0.55, 4),
  s7MakeBlue(35, S7F.w * 0.68, S7F.h * 0.30, 'FW', S7F.h * 0.06, S7F.h * 0.55, 4),
  s7MakeBlue(37, S7F.w * 0.50, S7F.h * 0.60, 'MF', S7F.h * 0.32, S7F.h * 0.78, 12)  // 中央MF(8人制で追加)
];
const s7BlueGK = (() => {
  const p = makePlayer(36, S7F.w / 2, S7F.h - 1.5, false);
  p.isGK = true;
  return p;
})();

// 赤: GK + フィールドプレーヤー6人(ゾーンディフェンス)
const s7RedGK = makeDefender(40, S7F.w / 2, 1.5, true);

const S7_AREA_W = S7F.w / 3;   // 集結半径の単位=エリアの横幅
// エリア: 縦(コート幅)3分割 × 横(ゴール方向)2分割。row 0=自ゴール側(後ろ)/ 1=ハーフウェー側(前)
function s7AreaCenter(col, row) {
  const x = S7_AREA_W * (col + 0.5);
  const y = row === 0 ? S7F.h * 0.125 : S7F.h * 0.375;
  return [x, y];
}
const S7_RED_AREAS = [[0, 0], [1, 0], [2, 0], [0, 1], [1, 1], [2, 1]];
function s7MakeRedDF(id, areaIdx) {
  const [col, row] = S7_RED_AREAS[areaIdx];
  const [ax, ay] = s7AreaCenter(col, row);
  const p = makeDefender(id, ax, ay, false);
  p.areaCol = col; p.areaRow = row;
  p.homeX = ax; p.homeY = ay;
  // 攻撃時の役割(戦術エンジン用): 後列=DF、前列は中央がMF・両サイドがFW
  p.role = row === 0 ? 'DF' : (col === 1 ? 'MF' : 'FW');
  return p;
}
const s7RedDF = [
  s7MakeRedDF(41, 0), s7MakeRedDF(42, 1), s7MakeRedDF(43, 2),
  s7MakeRedDF(44, 3), s7MakeRedDF(45, 4), s7MakeRedDF(46, 5)
];

// 赤の前線FW(8人制で追加): ゾーンには入らず、前線で待って攻撃の起点になる
const s7RedFW = (() => {
  const p = makeDefender(47, S7F.w / 2, S7F.h * 0.55, false);
  p.role = 'FW';
  p.homeX = S7F.w / 2;
  p.homeY = S7F.h * 0.55;
  return p;
})();
const s7RedOutfield = [...s7RedDF, s7RedFW];

// ---------- フォーメーション(試合中も設定画面から変更可) ----------
// 青: 7人目(中央MF/追加ぶん)の役割・ポジションだけを差し替えて3パターンを作る
const S7_BLUE_FORMATIONS = [
  { key: 'balance', label: 'バランス(2-3-2)',
    p6: { role: 'MF', x: 0.50, y: 0.60, minY: 0.32, maxY: 0.78, push: 12 } },
  { key: 'attack',  label: 'こうげき(2-2-3)',
    p6: { role: 'FW', x: 0.50, y: 0.34, minY: 0.06, maxY: 0.55, push: 6 } },
  { key: 'defense', label: 'しゅび(3-2-2)',
    p6: { role: 'DF', x: 0.50, y: 0.85, minY: 0.60, maxY: 0.95, push: 10 } }
];
function s7ApplyBlueFormation() {
  const f = S7_BLUE_FORMATIONS[S7.blueFormationIdx].p6;
  const p = s7Blue[6];
  p.role = f.role;
  p.baseX = S7F.w * f.x; p.baseY = S7F.h * f.y;
  p.minY = S7F.h * f.minY; p.maxY = S7F.h * f.maxY;
  p.pushDist = f.push;
}

// 赤: ゾーンの位置(homeX/homeY)は変えず、各エリアの役割だけ差し替えて
// 攻撃時の前後距離(前がかり/バランス/守備的)を変える。ゾーン守備そのものは変わらない
const S7_RED_FORMATIONS = [
  { key: 'balance', label: 'バランス(3-1-3)', roles: ['DF', 'DF', 'DF', 'FW', 'MF', 'FW'] },
  { key: 'attack',  label: 'こうげき(2-1-4)', roles: ['DF', 'DF', 'MF', 'FW', 'FW', 'FW'] },
  { key: 'defense', label: 'しゅび(4-1-2)',   roles: ['DF', 'DF', 'DF', 'MF', 'DF', 'FW'] }
];
function s7ApplyRedFormation() {
  const roles = S7_RED_FORMATIONS[S7.redFormationIdx].roles;
  s7RedDF.forEach((p, i) => { p.role = roles[i]; });
}

// なんいど設定(Phase 3で選択画面を用意する。今は初期値のみ)
const S7_GATHER_RADIUS_UNITS = [1, 1.5, 2];
S7.gatherRadiusIdx = 1;   // 1.5倍
function s7GatherRadius() { return S7_AREA_W * S7_GATHER_RADIUS_UNITS[S7.gatherRadiusIdx]; }

// しあいモードの設定(Phase 3: 試合前の設定画面で選択)
const S7_DURATIONS = [120, 180, 300];
const S7_STRENGTH = [
  { label: 'よわい', speed: 0.85, think: 0.45 },
  { label: 'ふつう', speed: 1.0,  think: 0.25 },
  { label: 'つよい', speed: 1.15, think: 0.10 }
];
S7.durationIdx = 1;    // 3ぷん
S7.strengthIdx = 1;    // ふつう
S7.showAreas = true;   // エリア表示
S7.showRadius = false; // 集結半径表示
S7.timeLeft = 0;
S7.redThink = 0;       // 赤の「判断の更新間隔」タイマー(反応速度=難易度)

function s7RedSpeed(base) { return base * S7_STRENGTH[S7.strengthIdx].speed; }

// ---------- しあいモード: 攻撃の作戦(戦術) ----------
// 各戦術は「ボールに対する役割ごとの前後距離」と「レーン(横位置)の作り方」のセット
const S7_TACTICS = [
  { key: 'normal',  label: 'ふつう' },
  { key: 'side',    label: 'サイド' },
  { key: 'center',  label: 'ちゅうおう' },
  { key: 'counter', label: 'カウンター' },
  { key: 'possess', label: 'ポゼッション' },
  { key: 'long',    label: 'ロング' },
  { key: 'pnm',     label: 'パス&ムーブ' },
  { key: 'overlap', label: 'オーバーラップ' },
  { key: 'switch',  label: 'サイドチェンジ' }
];
const S7_TACTIC_PARAMS = {
  //                ボールよりどれだけ前か(m)         レーンの作り方
  normal:  { ahead: { FW: 7,  MF: 1,  DF: -9 },  laneMode: 'normal' },                   // バランス型
  side:    { ahead: { FW: 8,  MF: 0,  DF: -9 },  laneMode: 'wide' },                     // サイド攻撃
  center:  { ahead: { FW: 7,  MF: 1,  DF: -9 },  laneMode: 'narrow', runs: true },       // 中央突破+裏抜けラン
  counter: { ahead: { FW: 13, MF: 3,  DF: -13 }, laneMode: 'normal', sprint: true },     // 速攻(奪った直後FWがスプリント)
  possess: { ahead: { FW: 5,  MF: -1, DF: -7 },  laneMode: 'close' },                    // ボール周りに三角形
  long:    { ahead: { FW: 12, MF: 2,  DF: -10 }, laneMode: 'normal', holdLine: true },   // FWが前線に張ってロングボールを待つ
  pnm:     { ahead: { FW: 7,  MF: 0,  DF: -8 },  laneMode: 'normal', giveGo: true },     // パスした人がすぐ前へ走る(ワンツー)
  overlap: { ahead: { FW: 6,  MF: 1,  DF: -8 },  laneMode: 'overlap' },                  // 後ろのDFがサイドを追い越す
  switch:  { ahead: { FW: 8,  MF: 0,  DF: -9 },  laneMode: 'pin' }                       // 両サイドに大きく張ってサイドチェンジ
};

// 設定画面に表示する説明: [AIのうごき, こうすると効果的(コツ)]
const S7_TACTIC_DESC = {
  normal:  ['ぜんいんが バランスよく ボールに あわせて うごくよ',
            'コツ: あいている みかたを さがして パスを つなごう'],
  side:    ['FWとMFが はしっこに ひろがって まもりを よこに ひろげるよ',
            'コツ: サイドを ドリブルして あいたら まんなかへ パス!'],
  center:  ['みんなが まんなかに あつまり FWが うらへ はしりこむよ',
            'コツ: うらに はしった FWへ タイミングよく たてパス!'],
  counter: ['うばった しゅんかん FWが いっきに かけあがるよ',
            'コツ: うばったら すぐ まえの FWへ おおきい パス!'],
  possess: ['みんなが ちかくに よって さんかくを つくるよ',
            'コツ: あわてず みじかい パス。うしろへ もどすのも だいじ!'],
  long:    ['FWが まえせんに はりつづけて ロングボールを まつよ',
            'コツ: ミニマップタップで まえの FWへ おおきく けりこもう!'],
  pnm:     ['パスした ひとが すぐ まえへ はしるよ(ワンツー)',
            'コツ: パスしたら はしりだした みかたへ すぐ かえそう!'],
  overlap: ['うしろの DFが サイドを おいこして あがってくるよ',
            'コツ: おいこした DFへ パスして かずで うわまわろう!'],
  switch:  ['りょうサイドに FWが おおきく ひらいて まっているよ',
            'コツ: まもりが かたよったら ミニマップで ぎゃくサイドへ!']
};

// 守備の作戦(じぶんのチームがまもるとき)
const S7_DEF_TACTICS = [
  { key: 'normal',  label: 'ふつう',     lines: { DF: 0.80, MF: 0.63, FW: 0.48 }, radiusMult: 1.0 },
  { key: 'high',    label: 'ハイプレス', lines: { DF: 0.62, MF: 0.47, FW: 0.33 }, radiusMult: 1.3 },
  { key: 'retreat', label: 'リトリート', lines: { DF: 0.86, MF: 0.73, FW: 0.60 }, radiusMult: 0.7 }
];
const S7_DEF_TACTIC_DESC = {
  normal:  ['じぶんじんに 3れつの ラインを つくって まもるよ',
            'コツ: はんけいに はいったら プレスで うばいに いこう'],
  high:    ['たかい いちから すぐに うばいに いくよ',
            'コツ: うばえたら おおチャンス! うらの スペースには ちゅうい'],
  retreat: ['ゴールまえまで さがって ブロックを かためるよ',
            'コツ: あわてず まもって うばったら カウンターだ!']
};

S7.blueTacticIdx = 0;       // じぶんの攻撃作戦
S7.blueDefTacticIdx = 0;    // じぶんの守備作戦
S7.redTacticIdx = 0;        // あいての作戦(0=おまかせ)
S7.redTacticKey = 'side';   // おまかせのとき試合開始時に抽選される実際の作戦
S7.blueGatherRadiusIdx = 1; // じぶんの守備の集結半径
S7.blueCounterT = 0;        // カウンター用: 奪った直後の数秒間
S7.redCounterT = 0;
S7.giveGoP = null;          // パス&ムーブ用: 直前にパスした選手
S7.giveGoT = 0;
S7.aceCount = 0;            // スーパーエースの人数(FWに適用): 足が速くシュートも速い
S7.passerCount = 0;         // スーパーパサーの人数(MFに適用): パスが速くて強い
S7.helperCount = 0;         // さいきょうディフェンダーの人数(DFに適用): 足が速く体が大きくボール奪取範囲が広い

// ---------- オンラインたいせんモード(Phase 1: せつぞくの仕組みだけ) ----------
// role: null / 'host' / 'guest'。ホストが部屋を作りコードを発行、ゲストがそのコードで直接つながる
const ONLINE = {
  role: null,
  peer: null,
  conn: null,
  code: '',        // ホストの4桁のへやコード
  inputCode: '',   // ゲストが入力中のコード(最大4桁)
  status: 'idle',  // 'idle' / 'connecting' / 'waiting' / 'connected' / 'error'
  errorMsg: '',
  guestInput: { dx: 0, dy: 0 }  // ホスト側: ゲストから届いた最新のスティック入力
};
const ONLINE_ID_PREFIX = 'soccer-atama-';

function onlineRandomCode() {
  return String(Math.floor(1000 + Math.random() * 9000));
}

function onlineReset() {
  if (ONLINE.peer && !ONLINE.peer.destroyed) ONLINE.peer.destroy();
  ONLINE.role = null;
  ONLINE.peer = null;
  ONLINE.conn = null;
  ONLINE.code = '';
  ONLINE.inputCode = '';
  ONLINE.status = 'idle';
  ONLINE.errorMsg = '';
  ONLINE.guestInput = { dx: 0, dy: 0 };
}

const ONLINE_SCREENS = ['onlineMenu', 'onlineHost', 'onlineJoinEntry', 'onlineJoinConnecting'];

function onlineSetupConn(conn) {
  ONLINE.conn = conn;
  conn.on('open', () => { ONLINE.status = 'connected'; });
  conn.on('data', data => { onlineHandleData(data); });
  conn.on('close', () => {
    const wasOnlineScreen = ONLINE_SCREENS.includes(APP.screen);
    onlineReset();
    if (wasOnlineScreen) APP.screen = 'title';
  });
  conn.on('error', () => {
    ONLINE.status = 'error';
    ONLINE.errorMsg = 'せつぞくが きれました';
  });
}

// へやを つくる(ホスト): 4桁コードでPeerを作り、あいてからの接続を待つ
function onlineHost() {
  onlineReset();
  ONLINE.role = 'host';
  ONLINE.status = 'connecting';
  ONLINE.code = onlineRandomCode();
  APP.screen = 'onlineHost';
  const peer = new Peer(ONLINE_ID_PREFIX + ONLINE.code);
  ONLINE.peer = peer;
  peer.on('open', () => { ONLINE.status = 'waiting'; });
  peer.on('connection', conn => { onlineSetupConn(conn); });
  peer.on('error', () => {
    ONLINE.status = 'error';
    ONLINE.errorMsg = 'へやを つくれませんでした';
  });
}

// へやに はいる(ゲスト): 入力されたコードあてに直接つなぎに行く
function onlineJoin(code) {
  onlineReset();
  ONLINE.role = 'guest';
  ONLINE.status = 'connecting';
  APP.screen = 'onlineJoinConnecting';
  const peer = new Peer();
  ONLINE.peer = peer;
  peer.on('open', () => {
    const conn = peer.connect(ONLINE_ID_PREFIX + code);
    onlineSetupConn(conn);
  });
  peer.on('error', () => {
    ONLINE.status = 'error';
    ONLINE.errorMsg = 'せつぞく できませんでした(コードを かくにんしてね)';
  });
}

// ---------- オンラインたいせんモード(Phase 2: ホストが試合を進行、ゲストは受信して描画するだけ) ----------
ONLINE.sendTimer = 0;

function onlineHandleData(data) {
  if (!data) return;
  if (data.t === 'st') onlineApplyVersusState(data);
  else if (data.t === 'in') { ONLINE.guestInput.dx = data.dx; ONLINE.guestInput.dy = data.dy; }
  else if (data.t === 'tap') onlineHandleGuestTap(data.fx, data.fy);
}

// ホスト側: ゲストから届いた最新のスティック入力を、操作中の赤選手に反映する(controlledPlayerの青の入力処理と同じ式)
function onlineApplyGuestInput(p) {
  const gi = ONLINE.guestInput;
  const ilen = Math.hypot(gi.dx, gi.dy);
  if (ilen > 0.01) {
    const n = Math.min(1, ilen);
    p.vx = gi.dx / ilen * PLAYER_SPEED * n;
    p.vy = gi.dy / ilen * PLAYER_SPEED * n;
    p.fx = gi.dx / ilen; p.fy = gi.dy / ilen;
  } else {
    p.vx = 0; p.vy = 0;
  }
}

// ホスト側: ゲストのタップ(フィールド座標)を、赤のシュート/パスとして処理する(青のタップ処理の赤版)
function onlineHandleGuestTap(fx, fy) {
  if (MATCH.mode !== 'versus' || MATCH.state !== 'play' || MATCH.paused) return;
  if (!controlledDefender || MATCH.attacker !== 'red' || ball.owner !== controlledDefender) return;
  const goalCx = FIELD.w / 2;
  if (fy > FIELD.h - 3.0 && Math.abs(fx - goalCx) < FIELD.goalW / 2 + 1.5) {
    const aimX = Math.max(goalCx - FIELD.goalW / 2 + 0.4,
                 Math.min(goalCx + FIELD.goalW / 2 - 0.4, fx));
    versusShoot(controlledDefender, aimX, FIELD.h);
    return;
  }
  let best = null, bestD = TAP_RADIUS;
  for (const d of defenders) {
    if (d === controlledDefender || d.isGK) continue;
    const dist = Math.hypot(d.x - fx, d.y - fy);
    if (dist < bestD) { bestD = dist; best = d; }
  }
  if (best) versusPass(controlledDefender, best);
}

// ゲスト側: 自分のスティック/キー/かたむき入力を毎フレーム読み取ってホストへ送る(自分では選手を動かさない)
ONLINE.sendInputTimer = 0;
function onlineSendGuestInput(dt) {
  if (!(ONLINE.conn && ONLINE.status === 'connected')) return;
  let ix = 0, iy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) ix -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) ix += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) iy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) iy += 1;
  if (stick.active) { ix += stick.dx; iy += stick.dy; }
  if (tilt.enabled && tilt.beta0 !== null) {
    ix += tiltAxis(tilt.gamma - tilt.gamma0);
    iy += tiltAxis(tilt.beta - tilt.beta0);
  }
  ONLINE.sendInputTimer -= dt;
  if (ONLINE.sendInputTimer > 0) return;
  ONLINE.sendInputTimer = 1 / 30;
  ONLINE.conn.send({ t: 'in', dx: ix, dy: iy });
}

// ゲスト側: ホストから届いた状態をそのまま選手・ボール・スコアに反映する(自分ではシミュレーションしない)
function onlineApplyVersusState(data) {
  if (data.ball) { ball.x = data.ball.x; ball.y = data.ball.y; }
  if (data.players) {
    data.players.forEach((d, i) => {
      const p = players[i];
      if (p) { p.x = d.x; p.y = d.y; p.fx = d.fx; p.fy = d.fy; }
    });
  }
  if (data.defenders) {
    data.defenders.forEach((d, i) => {
      const p = defenders[i];
      if (p) { p.x = d.x; p.y = d.y; p.fx = d.fx; p.fy = d.fy; }
    });
  }
  if (data.blueGK) {
    blueGK.x = data.blueGK.x; blueGK.y = data.blueGK.y;
    blueGK.fx = data.blueGK.fx; blueGK.fy = data.blueGK.fy;
  }
  if (data.match) {
    MATCH.blueScore = data.match.blueScore;
    MATCH.redScore = data.match.redScore;
    MATCH.attacker = data.match.attacker;
    MATCH.state = data.match.state;
    MATCH.timeLeft = data.match.timeLeft;
    MATCH.message = data.match.message;
  }
  if (ONLINE.role === 'guest' && (data.appScreen === 'play' || data.appScreen === 'result')) {
    MATCH.mode = 'versus';
    APP.screen = data.appScreen;
  }
}

// ホスト側: 現在の試合の状態を20Hzくらいでゲストへ送る
function onlineBroadcastVersusState(dt) {
  if (!(ONLINE.role === 'host' && ONLINE.conn && ONLINE.status === 'connected')) return;
  ONLINE.sendTimer -= dt;
  if (ONLINE.sendTimer > 0) return;
  ONLINE.sendTimer = 1 / 20;
  ONLINE.conn.send({
    t: 'st',
    appScreen: APP.screen,
    ball: { x: ball.x, y: ball.y },
    players: players.map(p => ({ x: p.x, y: p.y, fx: p.fx, fy: p.fy })),
    defenders: defenders.map(p => ({ x: p.x, y: p.y, fx: p.fx, fy: p.fy })),
    blueGK: { x: blueGK.x, y: blueGK.y, fx: blueGK.fx, fy: blueGK.fy },
    match: {
      blueScore: MATCH.blueScore, redScore: MATCH.redScore, attacker: MATCH.attacker,
      state: MATCH.state, timeLeft: MATCH.timeLeft, message: MATCH.message
    }
  });
}

function toggleTilt() {
  sfxClick();
  if (tilt.enabled) {
    tilt.enabled = false;
    showToast('スティックそうさに もどしたよ');
    return;
  }
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS: ユーザー操作の中で許可を取る必要がある
    DeviceOrientationEvent.requestPermission().then(state => {
      if (state === 'granted') enableTilt();
      else showToast('センサーの きょかが もらえなかったよ');
    }).catch(err => {
      console.log('requestPermission error:', err);
      showToast('センサーが つかえなかったよ');

function enableTilt() {
  tilt.enabled = true;
  tilt.beta0 = null;  // 次に届くセンサー値を基準にする
  stick.active = false;

// 傾き角度(度) → -1〜1 の入力値。小さい傾きは無視する
function tiltAxis(deg) {
  const DEAD = 3, MAX = 18;
  const a = Math.abs(deg);
  if (a < DEAD) return 0;
  return Math.sign(deg) * Math.min(1, (a - DEAD) / (MAX - DEAD));
}

// ---------- サウンド(Web Audio APIで簡易生成、外部音源なし) ----------
let audioCtx = null;
function ensureAudio() {
  if (audioCtx) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return;
  }
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) {
    audioCtx = null;
  }
}

function playTone(freq, duration, type, volume, when) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + (when || 0);
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, t0);
  gain.gain.setValueAtTime(0.0001, t0);
  gain.gain.linearRampToValueAtTime(volume, t0 + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + duration + 0.03);
}

function sfxClick()   { playTone(880, 0.05, 'square', 0.10); }
function sfxPass()    { playTone(520, 0.08, 'triangle', 0.16); }
function sfxShoot()   { playTone(220, 0.10, 'sawtooth', 0.20); playTone(440, 0.08, 'sawtooth', 0.12, 0.03); }
function sfxSave()    { playTone(320, 0.10, 'square', 0.15); playTone(210, 0.14, 'square', 0.12, 0.07); }
function sfxLost()    { playTone(180, 0.20, 'sine', 0.13); playTone(140, 0.22, 'sine', 0.10, 0.06); }
function sfxGoal()    { [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => playTone(f, 0.20, 'square', 0.16, i * 0.09)); }
function sfxWhistle() { playTone(1800, 0.12, 'square', 0.12); playTone(1800, 0.12, 'square', 0.12, 0.18); }

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  ensureAudio();  // iOSはユーザー操作の中でしか音を鳴らせないため、最初のタップで解放
  for (const t of e.changedTouches) {
    // そうさ(いどう)の切り替えは、iOSのセンサー許可はtouchendでしか呼べないので
    // ここでは「ボタンに触れた」ことだけ覚えておく(せっていパネルが開いているときだけ判定)
    if (inActiveTiltRow(t.clientX, t.clientY)) {
      buttonTouches.add(t.identifier);
      continue;
    }
    // せっていボタンは、スティックの判定範囲と近くても
    // 必ずボタンとして扱う(スティック起動より先にチェックする)
    if (inSettingsButton(t.clientX, t.clientY)) {
      handleTap(t.clientX, t.clientY);
      continue;
    }
    const [hx, hy] = stickHome();
    const nearStick = Math.hypot(t.clientX - hx, t.clientY - hy) < 130;
    const leftBottom = t.clientX < window.innerWidth * 0.45 &&
                       t.clientY > window.innerHeight * 0.55;
    if (!tilt.enabled && !stick.active && !isAnyPaused() && (nearStick || leftBottom)) {
      stick.active = true;
      stick.touchId = t.identifier;
      stick.baseX = t.clientX;
      stick.baseY = t.clientY;
      stick.dx = 0; stick.dy = 0;
    } else {
      handleTap(t.clientX, t.clientY);
    }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (stick.active && t.identifier === stick.touchId) {
      let dx = t.clientX - stick.baseX;
      let dy = t.clientY - stick.baseY;
      const len = Math.hypot(dx, dy);
      if (len > stick.maxR) { dx = dx / len * stick.maxR; dy = dy / len * stick.maxR; }
      stick.dx = dx / stick.maxR;
      stick.dy = dy / stick.maxR;
    }
  }
}, { passive: false });

function endTouch(e, isCancel) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (buttonTouches.has(t.identifier)) {
      buttonTouches.delete(t.identifier);
      // 指を離した位置がボタンの上なら切り替え(touchend はiOSの
      // ユーザー操作として認められるので、ここなら許可ダイアログが出せる)
      if (!isCancel && inActiveTiltRow(t.clientX, t.clientY)) toggleTilt();
      continue;
    }
    if (stick.active && t.identifier === stick.touchId) {
      stick.active = false;
      stick.touchId = null;
      stick.dx = 0; stick.dy = 0;
    }
  }
}
canvas.addEventListener('touchend', e => endTouch(e, false), { passive: false });
canvas.addEventListener('touchcancel', e => endTouch(e, true), { passive: false });

// 4桁コード入力用のテンキー(電話のような配置: 1〜9 → 空/0/けす)
function onlineKeypadGeom() {
  const w = 74, h = 58, gapX = 12, gapY = 10;
  const cols = 3;
  const totalW = w * cols + gapX * (cols - 1);
  const startX = (window.innerWidth - totalW) / 2;
  const startY = window.innerHeight * 0.36;
  return { w, h, gapX, gapY, startX, startY };
}
function onlineKeypadRect(digit) {
  const { w, h, gapX, gapY, startX, startY } = onlineKeypadGeom();
  const row = digit === 0 ? 3 : Math.floor((digit - 1) / 3);
