function startRound() {
  MATCH.mode = 'practice';
  game.score = 0;
  stats.shots = 0; stats.saved = 0; stats.missed = 0;
  stats.passCut = 0; stats.dribbleSteal = 0;
  stats.goodPasses = 0; stats.niceRuns = 0; stats.hints = 0;
  lastNiceRunAt = -Infinity;
  lastHintAt = -Infinity;
  roundTime = ROUND_DURATION;
  judge.active = false;
  APP.screen = 'play';
  setupKickoff();
  sfxWhistle();
}

function endRound() {
  APP.screen = 'result';
  coachAdvice = computeCoachAdvice();
  sfxWhistle();
}

function computeCoachAdvice() {
  const candidates = [
    { count: stats.passCut, msg: 'あかい せんの パスは とられやすいよ。みどりの せんを さがそう!' },
    { count: stats.dribbleSteal, msg: 'てきに ちかづきすぎたよ。とおくの みかたに パスしてみよう!' },
    { count: stats.missed, msg: 'シュートは ゴールの まんなかを ねらうと はいりやすいよ!' },
    { count: stats.hints, msg: 'あいている みかたを さがす れんしゅうを してみよう!' }
  ];
  candidates.sort((a, b) => b.count - a.count);
  if (candidates[0].count > 0) return candidates[0].msg;
  if (stats.niceRuns > 0) return 'スペースを みつけるのが とても じょうずだね!';
  if (game.score > 0) return 'ナイスゴール! そのちょうしで がんばろう!';
  return 'つぎは ボールを もって いろいろ ためしてみよう!';
}

function handleTap(sx, sy) {
  if (APP.screen === 'title') {
    if (inPracticeButton(sx, sy)) { sfxClick(); startRound(); }
    else if (inVersusButton(sx, sy)) { sfxClick(); APP.screen = 'timeSelect'; }
    else if (inS7Button(sx, sy)) { sfxClick(); S7.setupPage = 0; APP.screen = 's7Setup'; }
    else if (inRect(sx, sy, onlineButtonRect())) { sfxClick(); APP.screen = 'onlineMenu'; }
    return;
  }
  if (APP.screen === 'onlineMenu') {
    if (inRect(sx, sy, onlineMenuButtonRect(0))) { sfxClick(); onlineHost(); }
    else if (inRect(sx, sy, onlineMenuButtonRect(1))) { sfxClick(); ONLINE.inputCode = ''; APP.screen = 'onlineJoinEntry'; }
    else if (inRect(sx, sy, onlineBackLinkRect())) { sfxClick(); onlineReset(); APP.screen = 'title'; }
    return;
  }
  if (APP.screen === 'onlineHost') {
    if (ONLINE.status === 'connected' && inRect(sx, sy, onlineStartMatchButtonRect())) {
      sfxClick(); APP.screen = 'timeSelect'; return;
    }
    if (inRect(sx, sy, onlineBackLinkRect())) { sfxClick(); onlineReset(); APP.screen = 'title'; }
    return;
  }
  if (APP.screen === 'onlineJoinEntry') {
    for (let i = 0; i < 10; i++) {
      if (inRect(sx, sy, onlineKeypadRect(i)) && ONLINE.inputCode.length < 4) {
        sfxClick();
        ONLINE.inputCode += String(i);
        return;
      }
    }
    if (inRect(sx, sy, onlineKeypadDeleteRect())) {
      sfxClick();
      ONLINE.inputCode = ONLINE.inputCode.slice(0, -1);
      return;
    }
    if (inRect(sx, sy, onlineJoinConfirmRect()) && ONLINE.inputCode.length === 4) {
      sfxClick();
      onlineJoin(ONLINE.inputCode);
      return;
    }
    if (inRect(sx, sy, onlineBackLinkRect())) { sfxClick(); onlineReset(); APP.screen = 'onlineMenu'; }
    return;
  }
  if (APP.screen === 'onlineJoinConnecting') {
    if (inRect(sx, sy, onlineBackLinkRect())) { sfxClick(); onlineReset(); APP.screen = 'onlineMenu'; }
    return;
  }
  if (APP.screen === 's7Setup') {
    const setupRows = s7SetupRows();
    for (let i = 0; i < setupRows.length; i++) {
      if (inRect(sx, sy, s7SettingRowRect(i))) {
        const row = setupRows[i];
        row.set((row.get() + 1) % row.values.length);
        sfxClick();
        return;
      }
    }
    if (inRect(sx, sy, s7SetupNavRect())) { sfxClick(); S7.setupPage = (S7.setupPage + 1) % S7_SETTING_PAGES.length; return; }
    if (inRect(sx, sy, s7StartMatchButtonRect())) { sfxClick(); s7Start(); return; }
    if (inRect(sx, sy, s7SetupBackLinkRect())) { sfxClick(); S7.setupPage = 0; APP.screen = 'title'; }
    return;
  }
  if (APP.screen === 'timeSelect') {
    if (inTimeButton(sx, sy, 0)) { sfxClick(); MATCH.duration = 60; APP.screen = 'levelSelect'; }
    else if (inTimeButton(sx, sy, 1)) { sfxClick(); MATCH.duration = 120; APP.screen = 'levelSelect'; }
    else if (inTimeButton(sx, sy, 2)) { sfxClick(); MATCH.duration = 180; APP.screen = 'levelSelect'; }
    else if (inTimeBackLink(sx, sy)) { sfxClick(); APP.screen = 'title'; }
    return;
  }
  if (APP.screen === 'levelSelect') {
    for (let i = 0; i < 5; i++) {
      if (inLevelButton(sx, sy, i)) { sfxClick(); startVersusRound(MATCH.duration, i + 1); return; }
    }
    if (inLevelBackLink(sx, sy)) { sfxClick(); APP.screen = 'timeSelect'; }
    return;
  }
  if (APP.screen === 'result') {
    if (ONLINE.role === 'guest') {
      // ゲストは観る側。つぎの試合を決めるのはホストなので、ここではタイトルへ戻る操作だけ受け付ける
      if (inTitleLink(sx, sy)) { sfxClick(); onlineReset(); APP.screen = 'title'; }
      return;
    }
    if (inReplayButton(sx, sy)) {
      sfxClick();
      if (MATCH.mode === 's7') s7Start();
      else if (MATCH.mode === 'versus') startVersusRound(MATCH.duration, MATCH.difficulty);
      else startRound();
    } else if (inTitleLink(sx, sy)) { sfxClick(); APP.screen = 'title'; }
    return;
  }

  if (MATCH.mode === 's7') {
    // ポーズ中: せっていパネルの操作のみ受け付ける
    if (S7.paused) {
      if (tilt.supported && inRect(sx, sy, s7TiltRowRect())) return;  // タップはtouchendで処理
      for (let i = 0; i < S7_PAUSE_ROWS.length; i++) {
        if (inRect(sx, sy, s7PauseRowRect(i))) {
          const row = S7_PAUSE_ROWS[i];
          sfxClick();
          row.set((row.get() + 1) % row.values.length);
          return;
        }
      }
      if (inRect(sx, sy, s7ResumeButtonRect())) { sfxClick(); S7.paused = false; return; }
      if (inRect(sx, sy, s7PauseQuitLinkRect())) { sfxClick(); s7ExitToTitle(); }
      return;
    }
    if (inSettingsButton(sx, sy)) { sfxClick(); S7.paused = true; return; }
    // 自分がパスを出せる保持者(操作中の選手、または青GKのゴールキック)
    const s7Passer = ball.owner === controlledPlayer ? controlledPlayer
                   : (ball.owner === s7BlueGK ? s7BlueGK : null);

    // ミニマップタップ → とおくの みかたへのロングパス(逆サイド展開・GKのロングフィード)
    {
      const [mx, my, mw, mh] = s7MinimapRect();
      if (sx >= mx && sx <= mx + mw && sy >= my && sy <= my + mh) {
        if (S7.state === 'play' && s7Passer) {
          const fx = (sx - mx) / mw * S7F.w;
          const fy = (sy - my) / mh * S7F.h;
          let best = null, bestD = 8;   // ミニマップは小さいので広めに拾う
          for (const p of s7Blue) {
            if (p === s7Passer) continue;
            const d = Math.hypot(p.x - fx, p.y - fy);
            if (d < bestD) { bestD = d; best = p; }
          }
          if (best) {
            const passDist = Math.hypot(best.x - s7Passer.x, best.y - s7Passer.y);
            if (s7Passer === s7BlueGK) s7GKKickTo(s7BlueGK, best);
            else s7Pass(s7Passer, best);
            judge.active = false;
            if (passDist > 18) showToast('おおきな サイドチェンジ!');
          }
        }
        return;
      }
    }
    if (S7.state !== 'play') return;
    // 青GKがキャッチ中: タップした味方へゴールキック(プレイヤーがパス先を選ぶ)
    if (ball.owner === s7BlueGK) {
      const [gfx, gfy] = toField(sx, sy);
      let gkBest = null, gkBestD = TAP_RADIUS + 1;   // 少し広めに拾う
      for (const p of s7Blue) {
        const d = Math.hypot(p.x - gfx, p.y - gfy);
        if (d < gkBestD) { gkBestD = d; gkBest = p; }
      }
      if (gkBest) s7GKKickTo(s7BlueGK, gkBest);
      return;
    }
    if (ball.owner !== controlledPlayer) return;
    const [fx, fy] = toField(sx, sy);
    const s7GoalCx = S7F.w / 2;
    // 上のゴールのあたりをタップ → シュート
    if (fy < 4.0 && Math.abs(fx - s7GoalCx) < S7F.goalW / 2 + 2) {
      const aimX = Math.max(s7GoalCx - S7F.goalW / 2 + 0.4,
                   Math.min(s7GoalCx + S7F.goalW / 2 - 0.4, fx));
      // スーパーエースはシュートも速い
      versusShoot(controlledPlayer, aimX, 0, controlledPlayer.isAce ? 1.25 : 1);
      judge.active = false;
      return;
    }
    let s7Best = null, s7BestD = TAP_RADIUS;
    for (const p of s7Blue) {
      if (p === controlledPlayer) continue;
      const d = Math.hypot(p.x - fx, p.y - fy);
      if (d < s7BestD) { s7BestD = d; s7Best = p; }
    }
    if (s7Best) {
      s7Pass(controlledPlayer, s7Best);
      judge.active = false;
    }
    return;
  }

  if (MATCH.mode === 'versus') {
    if (ONLINE.role === 'guest') {
      // ゲストはポーズ/せっていに触れない(止められるのはホストだけ)。タップはフィールド座標に変換してホストへ送るだけ
      if (MATCH.state !== 'play') return;
      const [gfx, gfy] = toField(sx, sy);
      if (ONLINE.conn) ONLINE.conn.send({ t: 'tap', fx: gfx, fy: gfy });
      return;
    }
    // ポーズ中: せっていパネルの操作のみ受け付ける
    if (MATCH.paused) {
      if (tilt.supported && inRect(sx, sy, versusTiltRowRect())) return; // タップはtouchendで処理
      if (inRect(sx, sy, versusResumeButtonRect())) { sfxClick(); MATCH.paused = false; return; }
      if (inRect(sx, sy, versusQuitLinkRect())) {
        sfxClick();
        MATCH.paused = false;
        MATCH.mode = null;
        APP.screen = 'title';
      }
      return;
    }
    if (inSettingsButton(sx, sy)) { sfxClick(); MATCH.paused = true; return; }
    if (MATCH.state !== 'play') return;
    if (MATCH.attacker !== 'blue' || ball.owner !== controlledPlayer) return;
    const [fx, fy] = toField(sx, sy);
    const goalCx = FIELD.w / 2;
    if (fy < 3.0 && Math.abs(fx - goalCx) < FIELD.goalW / 2 + 1.5) {
      const aimX = Math.max(goalCx - FIELD.goalW / 2 + 0.4,
                   Math.min(goalCx + FIELD.goalW / 2 - 0.4, fx));
      versusShoot(controlledPlayer, aimX, 0);
      return;
    }
    let vBest = null, vBestD = TAP_RADIUS;
    for (const p of players) {
      if (p === controlledPlayer) continue;
      const d = Math.hypot(p.x - fx, p.y - fy);
      if (d < vBestD) { vBestD = d; vBest = p; }
    }
    if (vBest) versusPass(controlledPlayer, vBest);
    return;
  }

  // ポーズ中: せっていパネルの操作のみ受け付ける
  if (game.paused) {
    for (let i = 0; i < PRACTICE_PAUSE_ROWS.length; i++) {
      if (inRect(sx, sy, practicePauseRowRect(i))) {
        const row = PRACTICE_PAUSE_ROWS[i];
        sfxClick();
        row.set((row.get() + 1) % row.values.length);
        return;
      }
    }
    if (inRect(sx, sy, practiceResumeButtonRect())) { sfxClick(); game.paused = false; return; }
    if (inRect(sx, sy, practiceQuitLinkRect())) {
      sfxClick();
      game.paused = false;
      MATCH.mode = null;
      APP.screen = 'title';
    }
    return;
  }
  if (inSettingsButton(sx, sy)) { sfxClick(); game.paused = true; return; }
  if (game.state !== 'play') return;
  if (ball.owner !== controlledPlayer) return;  // 自分がボールを持っている時だけ
  const [fx, fy] = toField(sx, sy);

  // ゴールのあたりをタップ → シュート(タップした位置をねらう)
  const goalCx = FIELD.w / 2;
  if (fy < 3.0 && Math.abs(fx - goalCx) < FIELD.goalW / 2 + 1.5) {
    const aimX = Math.max(goalCx - FIELD.goalW / 2 + 0.4,
                 Math.min(goalCx + FIELD.goalW / 2 - 0.4, fx));
    shootBall(controlledPlayer, aimX);
    return;
  }

  // タップ位置に近い味方を探す
  let best = null, bestD = TAP_RADIUS;
  for (const p of players) {
    if (p === controlledPlayer) continue;
    const d = Math.hypot(p.x - fx, p.y - fy);
    if (d < bestD) { bestD = d; best = p; }
  }
  if (best) passBall(controlledPlayer, best);
}

// ---------- パス ----------
function passBall(from, to) {
  // 受け手の少し先を狙う(動きに合わせたリードパス)
  const lead = 0.25;
  const tx = to.x + to.vx * lead;
  const ty = to.y + to.vy * lead;
  const dx = tx - ball.x, dy = ty - ball.y;
  const len = Math.hypot(dx, dy) || 1;
  ball.vx = dx / len * PASS_SPEED;
  ball.vy = dy / len * PASS_SPEED;
  ball.owner = null;
  ball.lastKicker = from;
  ball.kickCooldown = KICK_COOLDOWN;
  ball.receiver = to;
  ball.trackedPass = (from === controlledPlayer) ? { receiver: to } : null;
  from.fx = dx / len; from.fy = dy / len;
  if (from === controlledPlayer) judge.active = false;  // パスした=判断完了
  sfxPass();
}

// パスコース上のリスク判定: 敵がライン上に近いほど「あぶない」
function laneIsRisky(from, to) {
  const abx = to.x - from.x, aby = to.y - from.y;
  const abLen2 = abx * abx + aby * aby || 1;
  for (const d of defenders) {
    const apx = d.x - from.x, apy = d.y - from.y;
    let t = (apx * abx + apy * aby) / abLen2;
    t = Math.max(0, Math.min(1, t));
    const cx = from.x + abx * t, cy = from.y + aby * t;
    if (t > 0.08 && t < 0.97 && Math.hypot(d.x - cx, d.y - cy) < LANE_RISK_DIST) return true;
  }
  return false;
}

function giveBall(p) {
  const wasTargetedPass = ball.receiver === p;
  ball.owner = p;
  ball.vx = 0; ball.vy = 0;
  ball.receiver = null;
  ball.isShot = false;

  // ボールをもつ人を操作するモード: 受け取った人に操作をわたす
  if (control.followBall && p.team === 'blue') {
    controlledPlayer = p;
  }

  if (p !== controlledPlayer) {
    p.holdTimer = 0;
    p.holdLimit = 0.9 + Math.random() * 0.9;  // 少し持ってからパス
  }

  // 即時フィードバック
  if (wasTargetedPass) {
    if (ball.trackedPass && ball.trackedPass.receiver === p) {
      showToast('いいパス!');
      stats.goodPasses++;
      ball.trackedPass = null;
    }
    if (p.team === 'blue') {
      const nearestDefDist = Math.min(...defenders.map(d => Math.hypot(p.x - d.x, p.y - d.y)));
      const now = performance.now();
      if (nearestDefDist > SPACE_THRESHOLD && now - lastNiceRunAt > NICE_RUN_COOLDOWN) {
        showToast('ナイスラン!');
        stats.niceRuns++;
        lastNiceRunAt = now;
      }
    }
  }

  // プレイヤーがボールを持ったら判断タイム開始
  if (p === controlledPlayer && judge.enabled) {
    judge.active = true;
    judge.timer = JUDGE_TIME;
  }
}

function shootBall(from, aimX) {
  const dx = aimX - ball.x, dy = -0.3 - ball.y;
  const len = Math.hypot(dx, dy) || 1;
  ball.vx = dx / len * SHOOT_SPEED;
  ball.vy = dy / len * SHOOT_SPEED;
  ball.owner = null;
  ball.lastKicker = from;
  ball.kickCooldown = KICK_COOLDOWN;
  ball.receiver = null;
  ball.trackedPass = null;
  ball.isShot = true;
  from.fx = dx / len; from.fy = dy / len;
  if (from === controlledPlayer) judge.active = false;  // シュートした=判断完了
  stats.shots++;
  sfxShoot();
}

// ---------- ゴール / ボールロスト / リスタート ----------
function onGoal() {
  game.score += 1;
  game.state = 'goal';
  game.timer = 1.8;
  game.message = 'ゴーール!';
  game.sub = 'キックオフから さいかい';
  ball.vx = 0; ball.vy = 0;
  judge.active = false;
  sfxGoal();
}

function loseBall(type) {
  game.state = 'lost';
  game.timer = 1.5;
  if (type === 'save') {
    game.message = 'キーパーが キャッチ!';
    stats.saved++;
    sfxSave();
  } else if (type === 'miss') {
    game.message = 'おしい! はずれた!';
    stats.missed++;
    sfxLost();
  } else if (type === 'passCut') {
    game.message = 'とられた!';
    stats.passCut++;
    sfxLost();
  } else {
    game.message = 'とられた!';
    stats.dribbleSteal++;
    sfxLost();
  }
  game.sub = 'バックラインから さいかい';
  ball.owner = null;
  ball.receiver = null;
  ball.trackedPass = null;
  ball.isShot = false;
  ball.vx = 0; ball.vy = 0;
  judge.active = false;
}

function resetDefense() {
  const pos = [
    [FIELD.w * 0.3, 11],
    [FIELD.w * 0.7, 11],
    [FIELD.w * 0.5, 6.5],
    [FIELD.w * 0.5, 1.2]
  ];
  defenders.forEach((d, i) => {
    d.x = pos[i][0]; d.y = pos[i][1];
    d.vx = 0; d.vy = 0; d.fx = 0; d.fy = 1;
  });
}

function resetAttack(userX, userY, mateY) {
  userPlayer.x = userX; userPlayer.y = userY;
  players[1].x = FIELD.w * 0.22; players[1].y = mateY;
  players[2].x = FIELD.w * 0.78; players[2].y = mateY;
  for (const p of players) { p.vx = 0; p.vy = 0; p.fx = 0; p.fy = -1; }
  ball.lastKicker = null;
  ball.kickCooldown = 0;
  giveBall(userPlayer);
  ball.x = userPlayer.x; ball.y = userPlayer.y - 0.75;
}

function setupKickoff() {
  resetDefense();
  resetAttack(FIELD.w / 2, FIELD.h * 0.52, FIELD.h * 0.45);
}

function setupBacklineRestart() {
  resetDefense();
  resetAttack(FIELD.w / 2, FIELD.h * 0.85, FIELD.h * 0.65);
}

// ============================================================
// たいせんモード(攻守切り替え・2ゴール)専用ロジック
// れんしゅうモードのupdate()/giveBall()等とは完全に独立させてある
// ============================================================
function attackGoalY(team) { return team === 'blue' ? 0 : FIELD.h; }
function ownGoalY(team)    { return team === 'blue' ? FIELD.h : 0; }
function oppTeam(team)     { return team === 'blue' ? 'red' : 'blue'; }
function teamOutfield(team) { return team === 'blue' ? players : defenders.filter(d => !d.isGK); }
function teamGK(team)       { return team === 'blue' ? blueGK : defenders.find(d => d.isGK); }

function versusPass(from, to) {
  const lead = 0.25;
  const tx = to.x + to.vx * lead, ty = to.y + to.vy * lead;
  const dx = tx - ball.x, dy = ty - ball.y;
  const len = Math.hypot(dx, dy) || 1;
  ball.vx = dx / len * PASS_SPEED;
  ball.vy = dy / len * PASS_SPEED;
  ball.owner = null;
  ball.lastKicker = from;
  ball.kickCooldown = KICK_COOLDOWN;
  ball.receiver = to;
  from.fx = dx / len; from.fy = dy / len;
  sfxPass();
}

function versusShoot(from, aimX, goalY, speedMult) {
  const dx = aimX - ball.x, dy = goalY - ball.y;
  const len = Math.hypot(dx, dy) || 1;
  const spd = SHOOT_SPEED * (speedMult || 1);
  ball.vx = dx / len * spd;
  ball.vy = dy / len * spd;
  ball.owner = null;
  ball.lastKicker = from;
  ball.kickCooldown = KICK_COOLDOWN;
  ball.receiver = null;
  from.fx = dx / len; from.fy = dy / len;
  sfxShoot();
}

// ボールを持っている人を操作できるように、青選手が保持したら操作対象を切り替える
// (青GKは操作対象にしない。ユーザーは常にフィールドプレーヤーを操作する)
// 赤も同様にcontrolledDefenderを切り替える(オンラインたいせんでゲストが操作する対象)
function maybeSwitchControlToBallOwner(p) {
  if (p.team === 'blue' && !p.isGK) controlledPlayer = p;
  if (p.team === 'red' && !p.isGK) controlledDefender = p;
}

function versusGiveBall(p) {
  const wasAttacker = p.team === MATCH.attacker;

  if (!wasAttacker && p.isGK) {
    // キーパーがキャッチ: 試合を止めて攻守交代・仕切り直し
    versusTurnover(p.team, 'キーパーが キャッチ!');
    return;
  }

  ball.owner = p;
  ball.vx = 0; ball.vy = 0;
  ball.receiver = null;
  if (p !== controlledPlayer) {
    p.holdTimer = 0;
    p.holdLimit = 0.9 + Math.random() * 0.9;
  }
  maybeSwitchControlToBallOwner(p);

  if (!wasAttacker) {
    // フィールドプレーヤーのインターセプト: 止めずにそのまま攻守交代して続行
    MATCH.attacker = p.team;
    showToast(p.team === 'blue' ? 'こうげき スタート!' : 'あいての こうげき!');
    sfxLost();
  } else {
    sfxPass();
  }
}

function versusTurnover(newAttacker, message) {
  MATCH.attacker = newAttacker;
  MATCH.state = 'turnover';
  MATCH.timer = 1.3;
  MATCH.message = message;
  ball.owner = null;
  ball.receiver = null;
  ball.vx = 0; ball.vy = 0;
  sfxLost();
}

function versusGoal(scoringTeam) {
  if (scoringTeam === 'blue') {
    MATCH.blueScore++;
    MATCH.message = 'ゴーール!';
    sfxGoal();
  } else {
    MATCH.redScore++;
    MATCH.message = 'あいてに ゴールされた…';
    sfxLost();
  }
  MATCH.state = 'goal';
  MATCH.timer = 1.8;
  MATCH.attacker = scoringTeam === 'blue' ? 'red' : 'blue';
  ball.vx = 0; ball.vy = 0;
}

// 攻撃側のフォーメーションに全員を並べ直す(キックオフ/得点後/ターンオーバー後で共通利用)
function versusFormation(attacker) {
  const goalCx = FIELD.w / 2;
  if (attacker === 'blue') {
    userPlayer.x = goalCx; userPlayer.y = FIELD.h * 0.60;
    players[1].x = FIELD.w * 0.25; players[1].y = FIELD.h * 0.55;
    players[2].x = FIELD.w * 0.75; players[2].y = FIELD.h * 0.55;
    defenders[0].x = FIELD.w * 0.3; defenders[0].y = 11;
    defenders[1].x = FIELD.w * 0.7; defenders[1].y = 11;
    defenders[2].x = goalCx;        defenders[2].y = 6.5;
  } else {
    defenders[0].x = FIELD.w * 0.25; defenders[0].y = FIELD.h * 0.40;
    defenders[1].x = FIELD.w * 0.75; defenders[1].y = FIELD.h * 0.40;
    defenders[2].x = goalCx;         defenders[2].y = FIELD.h * 0.45;
    userPlayer.x = goalCx;      userPlayer.y = FIELD.h - 11;
    players[1].x = FIELD.w * 0.3; players[1].y = FIELD.h - 11;
    players[2].x = FIELD.w * 0.7; players[2].y = FIELD.h - 6.5;
  }
  defenders[3].x = goalCx; defenders[3].y = 1.2;         // 赤GK(自陣ゴール前)
  blueGK.x = goalCx;       blueGK.y = FIELD.h - 1.2;     // 青GK(自陣ゴール前)

  for (const p of [...players, ...defenders, blueGK]) {
    p.vx = 0; p.vy = 0; p.fx = 0; p.fy = attacker === 'blue' ? -1 : 1;
  }
  ball.lastKicker = null;
  ball.kickCooldown = 0;

  const kicker = attacker === 'blue' ? userPlayer : defenders[2];
  ball.owner = kicker;
  ball.receiver = null;
  ball.vx = 0; ball.vy = 0;
  if (kicker.team === 'blue') controlledPlayer = kicker; else controlledDefender = kicker;
  if (kicker !== controlledPlayer) {
    kicker.holdTimer = 0;
    kicker.holdLimit = 0.9 + Math.random() * 0.9;
  }
  ball.x = kicker.x; ball.y = kicker.y + (attacker === 'blue' ? -0.75 : 0.75);
}

function versusSupportSpot(p, team) {
  const mates = teamOutfield(team).filter(q => q !== controlledPlayer);
  const idx = mates.indexOf(p);
  const side = idx === 0 ? -1 : 1;
  const dir = team === 'blue' ? -1 : 1;
  let tx = ball.x + side * 5.5;
  let ty = ball.y + dir * 4.5;
  const m = 1.5;
  tx = Math.max(m, Math.min(FIELD.w - m, tx));
  ty = Math.max(m, Math.min(FIELD.h - m, ty));
  return [tx, ty];
}

function versusAttackAI(p, dt, team) {
  const dir = team === 'blue' ? -1 : 1;
  const goalY = attackGoalY(team);
  const mates = teamOutfield(team);
  let tx = p.x, ty = p.y;

  if (ball.owner === p) {
    p.holdTimer += dt;
    ty = p.y + dir * 1.5;
    const nearGoal = dir === -1 ? p.y < 10 : p.y > FIELD.h - 10;
    if (p.holdTimer >= p.holdLimit) {
      if (nearGoal) {
        const goalCx = FIELD.w / 2;
        const aimX = goalCx + (Math.random() * 2 - 1) * (FIELD.goalW / 2 - 0.5);
        versusShoot(p, aimX, goalY);
      } else {
        const targets = mates.filter(q => q !== p);
        const to = targets[Math.floor(Math.random() * targets.length)];
        versusPass(p, to);
      }
    }
  } else if (ball.receiver === p && !ball.owner) {
    tx = ball.x + ball.vx * 0.2;
    ty = ball.y + ball.vy * 0.2;
  } else if (!ball.owner && !ball.receiver) {
    let nearest = null, nd = Infinity;
    for (const q of mates) {
      if (q === controlledPlayer) continue;
      const d = Math.hypot(ball.x - q.x, ball.y - q.y);
      if (d < nd) { nd = d; nearest = q; }
    }
    if (nearest === p) { tx = ball.x; ty = ball.y; }
    else { [tx, ty] = versusSupportSpot(p, team); }
  } else {
    [tx, ty] = versusSupportSpot(p, team);
  }
  moveToward(p, tx, ty, versusSpeed(team, AI_SPEED), dt);
}

function versusDefendAI(p, dt, team) {
  const mates = teamOutfield(team).filter(q => q !== controlledPlayer);
  let amClosest = true;
  const myDist = Math.hypot(ball.x - p.x, ball.y - p.y);
  for (const q of mates) {
    if (q === p) continue;
    if (Math.hypot(ball.x - q.x, ball.y - q.y) < myDist) { amClosest = false; break; }
  }
  let tx, ty;
  if (amClosest) {
    tx = ball.x; ty = ball.y;
  } else {
    const goalCx = FIELD.w / 2;
    const oppMates = teamOutfield(oppTeam(team));
    const idx = Math.max(0, mates.indexOf(p));
    const m = oppMates[idx % oppMates.length];
    const gY = ownGoalY(team);
    tx = m.x + (goalCx - m.x) * 0.3;
    ty = m.y + (gY - m.y) * 0.3;
  }
  moveToward(p, tx, ty, versusSpeed(team, DF_SPEED), dt);
}

function versusGKIdle(gk, dt, team) {
  const goalCx = FIELD.w / 2;
  const gty = ownGoalY(team) + (team === 'blue' ? -1.2 : 1.2);
  const gtx = Math.max(goalCx - 1.5, Math.min(goalCx + 1.5, ball.x));
  moveToward(gk, gtx, gty, versusSpeed(team, GK_SPEED * 0.6), dt);
}

function versusGKDefend(gk, dt, team) {
  const goalCx = FIELD.w / 2;
  const gty = ownGoalY(team) + (team === 'blue' ? -1.2 : 1.2);
  let targetX = ball.x;
  const approaching = team === 'blue' ? ball.vy > 0.01 : ball.vy < -0.01;
  if (!ball.owner && approaching) {
    const t = (gty - ball.y) / ball.vy;
    if (t > 0 && isFinite(t)) targetX = ball.x + ball.vx * t;
  }
  const postPad = gk.radius * 0.4;
  const gtx = Math.max(goalCx - FIELD.goalW / 2 + postPad,
              Math.min(goalCx + FIELD.goalW / 2 - postPad, targetX));
  moveToward(gk, gtx, gty, versusSpeed(team, GK_SPEED), dt);
}

function startVersusRound(duration, difficulty) {
  MATCH.mode = 'versus';
  MATCH.duration = duration;
  MATCH.timeLeft = duration;
  MATCH.difficulty = difficulty || MATCH.difficulty || 1;
  MATCH.blueScore = 0;
  MATCH.redScore = 0;
  MATCH.attacker = 'blue';
  MATCH.state = 'play';
  controlledPlayer = userPlayer;
  APP.screen = 'play';
  versusFormation('blue');
  sfxWhistle();
}

function endVersusRound() {
  APP.screen = 'result';
  sfxWhistle();
}

function updateVersus(dt) {
  if (MATCH.state !== 'play') {
    MATCH.timer -= dt;
    if (MATCH.timer <= 0) {
      versusFormation(MATCH.attacker);
      MATCH.state = 'play';
    }
    return;
  }

  // ユーザー入力(ボールを持っている青選手を直接操作する)
  let ix = 0, iy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) ix -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) ix += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) iy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) iy += 1;
  if (stick.active) { ix += stick.dx; iy += stick.dy; }
  if (tilt.enabled && tilt.beta0 !== null) {
    ix += tiltAxis(tilt.gamma - tilt.gamma0);
    iy += tiltAxis(tilt.beta - tilt.beta0);
  }
  const ilen = Math.hypot(ix, iy);
  if (ilen > 0.01) {
    const n = Math.min(1, ilen);
    controlledPlayer.vx = ix / ilen * PLAYER_SPEED * n;
    controlledPlayer.vy = iy / ilen * PLAYER_SPEED * n;
    controlledPlayer.fx = ix / ilen; controlledPlayer.fy = iy / ilen;
  } else {
    controlledPlayer.vx = 0; controlledPlayer.vy = 0;
  }

  // 青チームAI(操作中の選手以外)
  for (const p of players) {
    if (p === controlledPlayer) continue;
    if (MATCH.attacker === 'blue') versusAttackAI(p, dt, 'blue');
    else versusDefendAI(p, dt, 'blue');
  }
  if (MATCH.attacker === 'blue') versusGKIdle(blueGK, dt, 'blue');
  else versusGKDefend(blueGK, dt, 'blue');

  // 赤チーム(オンラインたいせんPhase 3: ホストはゲストの入力でcontrolledDefenderだけ動かし、残りはAI)
  const guestControlsRed = ONLINE.role === 'host' && ONLINE.conn && ONLINE.status === 'connected';
  for (const d of defenders) {
    if (d.isGK) continue;
    if (guestControlsRed && d === controlledDefender) onlineApplyGuestInput(d);
    else if (MATCH.attacker === 'red') versusAttackAI(d, dt, 'red');
    else versusDefendAI(d, dt, 'red');
  }
  const redGK = defenders.find(d => d.isGK);
  if (MATCH.attacker === 'red') versusGKIdle(redGK, dt, 'red');
  else versusGKDefend(redGK, dt, 'red');

  // 移動+コート内クランプ
  const roster = [...players, ...defenders, blueGK];
  for (const p of roster) {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.x = Math.max(p.radius, Math.min(FIELD.w - p.radius, p.x));
    p.y = Math.max(p.radius, Math.min(FIELD.h - p.radius, p.y));
  }

  // ボール
  if (ball.kickCooldown > 0) ball.kickCooldown -= dt;
  const goalCx = FIELD.w / 2;

  if (ball.owner) {
    const o = ball.owner;
    ball.x = o.x + o.fx * 0.75;
    ball.y = o.y + o.fy * 0.75;
    ball.vx = 0; ball.vy = 0;

    const defTeam = oppTeam(MATCH.attacker);
    const defRoster = defTeam === 'blue' ? [...players, blueGK] : defenders;
    for (const d of defRoster) {
      if (d === o) continue;
      const dist = Math.hypot(ball.x - d.x, ball.y - d.y);
      if (dist < STEAL_DIST) {
        if (d.isGK) {
          // キーパーがキャッチ: 試合を止めて攻守交代・仕切り直し
          versusTurnover(defTeam, 'キーパーが キャッチ!');
        } else {
          // フィールドプレーヤーが奪う: 止めずにそのまま攻守交代して続行
          MATCH.attacker = defTeam;
          ball.owner = d;
          ball.receiver = null;
          if (d !== controlledPlayer) {
            d.holdTimer = 0;
            d.holdLimit = 0.9 + Math.random() * 0.9;
          }
          maybeSwitchControlToBallOwner(d);
          showToast(defTeam === 'blue' ? 'こうげき スタート!' : 'あいての こうげき!');
          sfxLost();
        }
        return;
      }
    }
  } else {
    ball.x += ball.vx * dt; ball.y += ball.vy * dt;
    const damp = Math.pow(0.35, dt);
    ball.vx *= damp; ball.vy *= damp;

    if (ball.y < ball.radius) {
      if (Math.abs(ball.x - goalCx) < FIELD.goalW / 2) { versusGoal('blue'); return; }
      ball.y = ball.radius; ball.vy *= -0.6;
    }
    if (ball.y > FIELD.h - ball.radius) {
      if (Math.abs(ball.x - goalCx) < FIELD.goalW / 2) { versusGoal('red'); return; }
      ball.y = FIELD.h - ball.radius; ball.vy *= -0.6;
    }
    if (ball.x < ball.radius)           { ball.x = ball.radius;           ball.vx *= -0.6; }
    if (ball.x > FIELD.w - ball.radius) { ball.x = FIELD.w - ball.radius; ball.vx *= -0.6; }

    const roster2 = [...players, ...defenders, blueGK];
    for (const p of roster2) {
      if (p === ball.lastKicker && ball.kickCooldown > 0) continue;
      const dist = Math.hypot(ball.x - p.x, ball.y - p.y);
      if (dist < CAPTURE_DIST) { versusGiveBall(p); break; }
    }
  }
}

// ---------- しあいモード: 進行・AI・カメラ ----------
function s7Start() {
  MATCH.mode = 's7';
  APP.screen = 'play';
  S7.score = 0;
  S7.redScore = 0;
  S7.stealCooldown = 0;
  S7.timeLeft = S7_DURATIONS[S7.durationIdx];
  S7.paused = false;
  judge.active = false;
  s7ApplyRedTactic();   // あいての作戦(おまかせならここで抽選)
  s7ApplyBlueFormation();
  s7ApplyRedFormation();
  // スペシャル選手の適用(じぶんのチーム)
  s7Blue[4].isAce = S7.aceCount >= 1;
  s7Blue[5].isAce = S7.aceCount >= 2;
  s7Blue[2].isPasser = S7.passerCount >= 1;
  s7Blue[3].isPasser = S7.passerCount >= 2;
  s7Blue[0].isHelper = S7.helperCount >= 1;
  s7Blue[1].isHelper = S7.helperCount >= 2;
  s7Blue[6].isHelper = S7.helperCount >= 3;    // 中央MF(8人制で追加)
  s7BlueGK.isSuperGK = S7.superGK;
  // スペシャル選手の適用(あいてのチーム)
  s7RedFW.isAce = S7.redAceCount >= 1;
  s7RedDF[3].isAce = S7.redAceCount >= 2;      // 前列サイドFW
  s7RedDF[4].isPasser = S7.redPasserCount >= 1; // 前列中央MF
  s7RedDF[1].isPasser = S7.redPasserCount >= 2; // 後列中央DF
  s7RedDF[0].isHelper = S7.redHelperCount >= 1; // 後列サイドDF
  s7RedDF[2].isHelper = S7.redHelperCount >= 2;
  s7RedDF[5].isHelper = S7.redHelperCount >= 3; // 前列サイドFW
  s7RedGK.isSuperGK = S7.redSuperGK;
  // さいきょうDFは体が大きい(ボールを奪える範囲も広い)
  for (const p of [...s7Blue, ...s7RedOutfield]) p.radius = p.isHelper ? 0.72 : 0.55;
  // スーパーGKは体が二回り大きい(見た目もキャッチ範囲も広い)
  s7BlueGK.radius = s7BlueGK.isSuperGK ? 0.95 : 0.55;
  s7RedGK.radius = s7RedGK.isSuperGK ? 0.95 : 0.55;
  S7.giveGoP = null;
  S7.giveGoT = 0;
  s7Kickoff('blue');
  S7.state = 'play';
  S7.cam.x = ball.x;
  S7.cam.y = ball.y;
  sfxWhistle();
}

function s7EndMatch() {
  APP.screen = 'result';
  judge.active = false;
  sfxWhistle();
}

function s7ExitToTitle() {
  MATCH.mode = null;
  judge.active = false;
  S7.paused = false;
  APP.screen = 'title';
}

function s7Kickoff(startTeam) {
  for (const p of s7Blue) {
    p.x = p.baseX; p.y = p.baseY;
    p.vx = 0; p.vy = 0; p.fx = 0; p.fy = -1;
  }
  for (const p of s7RedOutfield) {
    p.x = p.homeX; p.y = p.homeY;
    p.vx = 0; p.vy = 0; p.fx = 0; p.fy = 1;
  }
  s7BlueGK.x = S7F.w / 2; s7BlueGK.y = S7F.h - 1.5;
  s7BlueGK.vx = 0; s7BlueGK.vy = 0; s7BlueGK.fx = 0; s7BlueGK.fy = -1;
  s7RedGK.x = S7F.w / 2; s7RedGK.y = 1.5;
  s7RedGK.vx = 0; s7RedGK.vy = 0; s7RedGK.fx = 0; s7RedGK.fy = 1;

  // センターサークルからキックオフ(得点された側のチームから)
  let kicker;
  if (startTeam === 'red') {
    kicker = s7RedFW;   // 前線FWがキックオフ
    kicker.x = S7F.w / 2; kicker.y = S7F.h / 2 - 1;
    kicker.holdTimer = 0;
    kicker.holdLimit = 0.9 + Math.random() * 0.6;
    controlledPlayer = s7Blue[2];
  } else {
    kicker = s7Blue[2];
    kicker.x = S7F.w / 2; kicker.y = S7F.h / 2 + 1;
    controlledPlayer = kicker;
  }
  S7.attacker = startTeam;
  ball.owner = kicker;
  ball.receiver = null;
  ball.lastKicker = null;
  ball.kickCooldown = 0;
  ball.vx = 0; ball.vy = 0;
  ball.isShot = false;
  ball.trackedPass = null;
  ball.x = kicker.x;
  ball.y = kicker.y + (startTeam === 'red' ? 0.75 : -0.75);
  S7.stealCooldown = 1.0;
  S7.redThink = 0;
  S7.blueCounterT = 0;
  S7.redCounterT = 0;
}

// しあいモード用のパス: フルコートは距離が長いので、距離に応じて強く蹴る
// (サイドチェンジなどの長いパスも届くようにする)
function s7Pass(from, to) {
  const lead = 0.25;
  const tx = to.x + to.vx * lead, ty = to.y + to.vy * lead;
  const dx = tx - ball.x, dy = ty - ball.y;
  const len = Math.hypot(dx, dy) || 1;
  // スーパーパサーはパスが速くて強い
  const mult = from.isPasser ? 1.3 : 1;
  const speed = Math.max(PASS_SPEED, Math.min(26 * mult, len * 1.4 * mult));
  ball.vx = dx / len * speed;
  ball.vy = dy / len * speed;
  ball.owner = null;
  ball.lastKicker = from;
  ball.kickCooldown = KICK_COOLDOWN;
  ball.receiver = to;
  from.fx = dx / len; from.fy = dy / len;
  // パス&ムーブ用: パスした選手を記録(数秒間、前へ走り込む)
  if (!from.isGK) {
    S7.giveGoP = from;
    S7.giveGoT = 2.5;
  }
  sfxPass();
}

function s7GiveBall(p) {
  const prevAttacker = S7.attacker;
  ball.owner = p;
  ball.vx = 0; ball.vy = 0;
  ball.receiver = null;
  ball.isShot = false;
  S7.attacker = p.team;   // ボールを持っているチームが攻撃側(攻守の切り替え)

  if (p.team === 'blue' && !p.isGK) {
    // ボールを持った味方に操作を渡す
    controlledPlayer = p;
    if (judge.enabled) { judge.active = true; judge.timer = JUDGE_TIME; }
  } else {
    p.holdTimer = 0;
    p.holdLimit = 0.9 + Math.random() * 0.6;
  }

  if (prevAttacker !== p.team) {
    // カウンター作戦用: 奪った直後の数秒間を記録
    if (p.team === 'blue') S7.blueCounterT = 4;
    else S7.redCounterT = 4;
    judge.active = p.team === 'blue' ? judge.active : false;
    showToast(p.team === 'blue' ? 'こうげき スタート!' : 'あいての こうげき! もどって まもろう!');
    sfxLost();
  } else {
    sfxPass();
  }

  // 青GKがキャッチしたら、プレイヤーがパス先を選べる(5秒たつとAIが自動で蹴る)
  if (p === s7BlueGK) {
    p.holdLimit = 5.0;
    showToast('キーパーキャッチ! みかたをタップして パスを だそう');
  }
}

function s7Goal() {
  S7.score++;
  S7.state = 'goal';
  S7.timer = 1.8;
  S7.message = 'ゴーール!';
  S7.nextKickoff = 'red';   // 決められた側からキックオフ
  ball.owner = null; ball.receiver = null;
  ball.vx = 0; ball.vy = 0;
  judge.active = false;
  sfxGoal();
}

function s7RedGoal() {
  S7.redScore++;
  S7.state = 'goal';
  S7.timer = 1.8;
  S7.message = 'ゴールされた…';
  S7.nextKickoff = 'blue';
  ball.owner = null; ball.receiver = null;
  ball.vx = 0; ball.vy = 0;
  judge.active = false;
  sfxLost();
}

// パスコースのリスク判定(しあいモード用: 赤チーム相手)
function s7LaneRisky(from, to) {
  const reds = [s7RedGK, ...s7RedOutfield];
  const abx = to.x - from.x, aby = to.y - from.y;
  const abLen2 = abx * abx + aby * aby || 1;
  for (const d of reds) {
    const apx = d.x - from.x, apy = d.y - from.y;
    let t = (apx * abx + apy * aby) / abLen2;
    t = Math.max(0, Math.min(1, t));
    const cx = from.x + abx * t, cy = from.y + aby * t;
    if (t > 0.08 && t < 0.97 && Math.hypot(d.x - cx, d.y - cy) < LANE_RISK_DIST) return true;
  }
  return false;
}

// 攻撃時のポジション(戦術エンジン): 選んだ作戦に応じて
// 「ボールに対する前後距離」と「レーンの作り方」が変わる。
// 青の座標系(上へ攻める)で計算し、赤はyを反転して使う
function s7AttackSpot(p, team) {
  const T = S7_TACTIC_PARAMS[s7TeamTactic(team)];
  const mirror = team === 'red';
  const by = mirror ? S7F.h - ball.y : ball.y;   // ボールy(青の座標系)
  const bx = ball.x;
  const role = p.role;
  const lane = team === 'blue' ? p.baseX : p.homeX;
  const goalCx = S7F.w / 2;
  const capMin = { FW: 4, MF: 7, DF: 12 }[role];   // 相手ゴールへ近づける限界
  const capMax = { FW: S7F.h * 0.62, MF: S7F.h * 0.80, DF: S7F.h * 0.95 }[role];
  const ballSide = Math.sign(bx - goalCx) || 1;
  const mySide = Math.sign(lane - goalCx) || 1;
  // 中央レーンの選手(青の中央MF・赤の前線FW)はワイド系の作戦でも中央に残る
  const isCenterLane = Math.abs(lane - goalCx) < 2;

  let ty = by - T.ahead[role];
  let tx;

  switch (T.laneMode) {
    case 'wide': {
      // サイド攻撃: FW/MFはタッチライン際まで開いて守備を横に広げる
      if (role === 'DF' || isCenterLane) {
        tx = lane + (bx - lane) * 0.25;
      } else {
        tx = mySide < 0 ? S7F.w * 0.10 : S7F.w * 0.90;
      }
      if (role === 'MF' && !isCenterLane && mySide === ballSide) {
        // ボールサイドのMFはウイングの外を追い越す(オーバーラップ)
        ty = by - 6;
        tx = mySide < 0 ? S7F.w * 0.06 : S7F.w * 0.94;
      }
      if (role === 'FW' && by < S7F.h * 0.25 && mySide !== ballSide) {
        // 深く攻めたら逆サイドFWはファーポストへ入る
        tx = goalCx + mySide * 2.5;
      }
      break;
    }
    case 'narrow':
      // 中央突破: 全員が中央レーンに絞る
      tx = goalCx + (lane - goalCx) * 0.35 + (bx - goalCx) * 0.2;
      break;
    case 'close': {
      // ポゼッション: ボールの周りに近い距離で三角形を作る
      const lat = role === 'DF' ? 7 : 5.5;
      tx = bx + mySide * lat;
      break;
    }
    case 'overlap': {
      // オーバーラップ: ボールサイドのDFがサイドを追い越して上がる。FWは中に絞ってスペースを作る
      if (role === 'DF' && mySide === ballSide) {
        ty = by - 7;
        tx = mySide < 0 ? S7F.w * 0.07 : S7F.w * 0.93;
      } else if (role === 'FW') {
        tx = goalCx + (lane - goalCx) * 0.4;
      } else {
        tx = lane + (bx - lane) * 0.3;
      }
      break;
    }
    case 'pin': {
      // サイドチェンジ: FWが両サイドのタッチライン際に張りっぱなし。MFは中央で中継役
      if (role === 'FW' && !isCenterLane) {
        tx = mySide < 0 ? S7F.w * 0.08 : S7F.w * 0.92;
      } else if (role === 'MF') {
        tx = goalCx + (lane - goalCx) * 0.3;
      } else {
        tx = lane + (bx - lane) * 0.3;
      }
      break;
    }
    default:
      tx = lane + (bx - lane) * 0.3;
  }

  if (T.holdLine && role === 'FW') {
    // ロングボール: FWはボールに合わせて下がらず、前線に張り続ける
    ty = 10;
    tx = goalCx + mySide * 5;
  }

  ty = Math.max(capMin, Math.min(capMax, ty));
  tx = Math.max(1.5, Math.min(S7F.w - 1.5, tx));
  return [tx, mirror ? S7F.h - ty : ty];
}

// 中央突破のFW裏抜けラン: ときどき2秒間、DFラインの裏(中央)へ全力で走り込む
function s7UpdateRun(p, dt, team) {
  p.running = p.running || 0;
  p.runCd = (p.runCd === undefined ? 2 + Math.random() * 3 : p.runCd) - dt;
  if (p.runCd <= 0 && p.running <= 0) {
    p.running = 2.0;
    p.runCd = 4 + Math.random() * 3;
  }
  if (p.running > 0) {
    p.running -= dt;
    const mirror = team === 'red';
    const by = mirror ? S7F.h - ball.y : ball.y;
    const lane = team === 'blue' ? p.baseX : p.homeX;
    const ty = Math.max(4, by - 13);
    let tx = S7F.w / 2 + (lane < S7F.w / 2 ? -3 : 3);
    tx = Math.max(1.5, Math.min(S7F.w - 1.5, tx));
    return [tx, mirror ? S7F.h - ty : ty];
  }
  return null;
}

function s7AttackAI(p, dt) {
  const T = S7_TACTIC_PARAMS[s7TeamTactic('blue')];
  let speed = AI_SPEED;
  let tx, ty;
  if (ball.receiver === p && !ball.owner) {
    // 自分あてのパスを迎えに行く
    tx = ball.x + ball.vx * 0.2;
    ty = ball.y + ball.vy * 0.2;
  } else if (!ball.owner && !ball.receiver) {
    // フリーボール: いちばん近い味方AIが拾いに行く
    let nearest = null, nd = Infinity;
    for (const q of s7Blue) {
      if (q === controlledPlayer) continue;
      const d = Math.hypot(ball.x - q.x, ball.y - q.y);
      if (d < nd) { nd = d; nearest = q; }
    }
    if (nearest === p) { tx = ball.x; ty = ball.y; }
  }
  if (tx === undefined) {
    // パス&ムーブ: パスした選手がすぐ前へ走り込む(ワンツー)
    if (T.giveGo && p === S7.giveGoP && S7.giveGoT > 0) {
      ty = Math.max(4, ball.y - 8);
      tx = Math.max(1.5, Math.min(S7F.w - 1.5, p.x + (ball.x - p.x) * 0.3));
      speed = AI_SPEED * 1.25;
    }
    // 中央突破: FWの裏抜けラン
    if (tx === undefined && T.runs && p.role === 'FW') {
      const run = s7UpdateRun(p, dt, 'blue');
      if (run) { [tx, ty] = run; speed = AI_SPEED * 1.2; }
    }
    if (tx === undefined) [tx, ty] = s7AttackSpot(p, 'blue');
    // カウンター: 奪った直後の数秒間、FWは全力で駆け上がる
    if (T.sprint && p.role === 'FW' && S7.blueCounterT > 0) speed = AI_SPEED * 1.25;
  }
  moveToward(p, tx, ty, speed * s7SpeedMult(p), dt);
}

// GKのゴールキック: 指定した味方へ蹴る(飛距離の上限あり。遠すぎると途中で失速する)
// ふつうのGKはハーフライン手前まで、スーパーGKは相手コートの中央付近まで飛ばせる
function s7GKKickTo(gk, to) {
  const cap = gk.isSuperGK ? 48 : 30;
  const lead = 0.25;
  const tx = to.x + to.vx * lead, ty = to.y + to.vy * lead;
  const dx = tx - ball.x, dy = ty - ball.y;
  const len = Math.hypot(dx, dy) || 1;
  const speed = Math.max(PASS_SPEED, Math.min(cap, len * 1.4));
  ball.vx = dx / len * speed;
  ball.vy = dy / len * speed;
  ball.owner = null;
  ball.lastKicker = gk;
  ball.kickCooldown = KICK_COOLDOWN;
  ball.receiver = to;
  sfxShoot();
}

// AIのゴールキック(配球): 届くはんいで いちばん前の味方へ蹴る
function s7GKKick(gk, team) {
  const maxDist = gk.isSuperGK ? 46 : 27;
  const mates = team === 'blue' ? s7Blue : s7RedOutfield;
  let best = null, bestScore = -Infinity;
  for (const q of mates) {
    const d = Math.hypot(q.x - gk.x, q.y - gk.y);
    if (d > maxDist) continue;
    const forwardness = team === 'blue' ? -q.y : q.y;   // 相手ゴールに近いほど高評価
    if (forwardness > bestScore) { bestScore = forwardness; best = q; }
  }
  if (!best) {
    let bd = Infinity;
    for (const q of mates) {
      const d = Math.hypot(q.x - gk.x, q.y - gk.y);
      if (d < bd) { bd = d; best = q; }
    }
  }
  s7GKKickTo(gk, best);
}

function s7BlueGKAI(dt) {
  const gkSpd = GK_SPEED * (s7BlueGK.isSuperGK ? 1.2 : 1);
  if (ball.owner === s7BlueGK) {
    // キャッチしたらゴールキックで前へつなぐ
    s7BlueGK.holdTimer += dt;
    if (s7BlueGK.holdTimer >= s7BlueGK.holdLimit) {
      s7GKKick(s7BlueGK, 'blue');
    }
    return;
  }
  // 赤のシュートの軌道を予測して先回り
  let targetX = ball.x;
  if (!ball.owner && ball.vy > 0.01) {
    const t = (S7F.h - 1.5 - ball.y) / ball.vy;
    if (t > 0 && isFinite(t)) targetX = ball.x + ball.vx * t;
  }
  const goalCx = S7F.w / 2;
  const postPad = s7BlueGK.radius * 0.4;
  const gtx = Math.max(goalCx - S7F.goalW / 2 + postPad,
              Math.min(goalCx + S7F.goalW / 2 - postPad, targetX));
  moveToward(s7BlueGK, gtx, S7F.h - 1.5, gkSpd, dt);
}

function s7RedGKAI(dt) {
  const gkSpd = s7RedSpeed(GK_SPEED) * (s7RedGK.isSuperGK ? 1.2 : 1);
  if (ball.owner === s7RedGK) {
    // キャッチしたらゴールキックで前へつなぐ
    s7RedGK.holdTimer += dt;
    if (s7RedGK.holdTimer >= s7RedGK.holdLimit) {
      s7GKKick(s7RedGK, 'red');
    }
    return;
  }
  // シュートの軌道を予測して先回り(既存GKと同じ考え方)
  let targetX = ball.x;
  if (!ball.owner && ball.vy < -0.01) {
    const t = (1.5 - ball.y) / ball.vy;
    if (t > 0 && isFinite(t)) targetX = ball.x + ball.vx * t;
  }
  const goalCx = S7F.w / 2;
  const postPad = s7RedGK.radius * 0.4;
  const gtx = Math.max(goalCx - S7F.goalW / 2 + postPad,
              Math.min(goalCx + S7F.goalW / 2 - postPad, targetX));
  moveToward(s7RedGK, gtx, 1.5, gkSpd, dt);
}

// ---------- しあいモード: 赤のゾーンディフェンス(Phase 2) ----------

// ゴールサイド(攻撃選手とじぶんのゴールを結ぶ線上、攻撃選手寄り)に立つ位置
function s7GoalSideOf(attacker) {
  const goalCx = S7F.w / 2, goalY = 0;
  const tx = attacker.x + (goalCx - attacker.x) * 0.3;
  const ty = attacker.y + (goalY - attacker.y) * 0.3;
  return [tx, ty];
}

// ホームエリアの基準位置。ボールサイドへスライドし、
// 相手が押し上げてくるほど守備ブロック全体をゴール側に下げて固める
function s7DefHomeSlide(p) {
  // ボールが赤陣に近づくほど 0→1(ハーフウェーより向こうなら0)
  const t = Math.max(0, Math.min(1, 1 - ball.y / (S7F.h * 0.5)));
  // 後列は 7.75m→4.5m、前列は 23.25m→11m までゴール側へ下がる
  const dropTarget = p.areaRow === 0 ? 4.5 : 11;
  const dropY = p.homeY - t * (p.homeY - dropTarget);

  const slideX = Math.max(-S7_AREA_W * 0.45, Math.min(S7_AREA_W * 0.45, (ball.x - p.homeX) * 0.3));
  const tx = Math.max(1.5, Math.min(S7F.w - 1.5, p.homeX + slideX));
  return [tx, dropY];
}

// 自分のホームエリアの中にいる攻撃選手(ボール保持者以外)を探す
function s7AttackerInMyArea(p) {
  const x0 = S7_AREA_W * p.areaCol, x1 = x0 + S7_AREA_W;
  const y0 = p.areaRow === 0 ? 0 : S7F.h * 0.25;
  const y1 = p.areaRow === 0 ? S7F.h * 0.25 : S7F.h * 0.5;
  let best = null, bd = Infinity;
  for (const a of s7Blue) {
    if (ball.owner === a) continue;   // 保持者はプレス役の担当
    if (a.x >= x0 && a.x < x1 && a.y >= y0 && a.y < y1) {
      const d = Math.hypot(a.x - p.homeX, a.y - p.homeY);
      if (d < bd) { bd = d; best = a; }
    }
  }
  return best;
}

// ゾーンディフェンス: ボールに行くのはプレス役1人+カバー役1人だけ。
// 残りは自分のエリアを守り、エリア内の攻撃選手をマークする(団子にならない)
// 目標位置の計算は「判断の更新間隔」(敵の強さ設定)ごとにしか行わない=反応速度
// GKがキャッチしているあいだ、相手チームの選手はキーパーから距離(9m)を取る
// (シュートまでの詰めは通常どおり。キャッチ後だけ下がる)
function s7KeepAwayFromGK(p, tx, ty) {
  const KEEP = 9;
  let gk = null;
  if (ball.owner === s7BlueGK && p.team === 'red') gk = s7BlueGK;
  else if (ball.owner === s7RedGK && p.team === 'blue') gk = s7RedGK;
  if (!gk) return [tx, ty];
  const dx = tx - gk.x, dy = ty - gk.y;
  const d = Math.hypot(dx, dy);
  if (d >= KEEP) return [tx, ty];
  if (d < 0.01) return [gk.x, gk.y + (gk === s7BlueGK ? -KEEP : KEEP)];
  let nx = gk.x + dx / d * KEEP;
  let ny = gk.y + dy / d * KEEP;
  nx = Math.max(1.5, Math.min(S7F.w - 1.5, nx));
  ny = Math.max(1.5, Math.min(S7F.h - 1.5, ny));
  return [nx, ny];
}

function s7ComputeRedDefenseTargets() {
  const radius = s7GatherRadius();
  // ボールに反応するのはホームエリアがボールに近いDFだけ
  const active = s7RedDF.filter(p => Math.hypot(ball.x - p.homeX, ball.y - p.homeY) < radius);

  let presser = null, pd = Infinity;
  for (const p of active) {
    const d = Math.hypot(ball.x - p.x, ball.y - p.y);
    if (d < pd) { pd = d; presser = p; }
  }
  let cover = null, cd = Infinity;
  for (const p of active) {
    if (p === presser) continue;
    const d = Math.hypot(ball.x - p.x, ball.y - p.y);
    if (d < cd) { cd = d; cover = p; }
  }

  for (const p of s7RedDF) {
    let tx, ty;
    if (p === presser) {
      // チャレンジ役: ボール保持者へプレス
      tx = ball.x; ty = ball.y;
    } else if (p === cover) {
      // カバー役: ボールと自ゴールの間、プレス役の少し後ろに立つ
      const gx = S7F.w / 2, gy = 0;
      const dx = gx - ball.x, dy = gy - ball.y;
      const len = Math.hypot(dx, dy) || 1;
      tx = ball.x + dx / len * 2.8;
      ty = ball.y + dy / len * 2.8;
    } else {
      // ゾーンを守る: エリア内に攻撃選手がいればゴールサイドでマーク、いなければ基準位置
      const m = s7AttackerInMyArea(p);
      if (m) [tx, ty] = s7GoalSideOf(m);
      else [tx, ty] = s7DefHomeSlide(p);
    }

    // さいきょうDF: あいてがハーフラインを超えたら積極的にボールへ寄せ、
    // ペナルティエリアに入ったら急速に詰める(通常のゾーン割り当てより優先)
    if (p.isHelper) {
      if (ball.y < 7) {
        tx = ball.x; ty = ball.y;
        p.pressBoost = 1.5;
      } else if (ball.y < S7F.h / 2) {
        tx = tx + (ball.x - tx) * 0.6;
        ty = ty + (ball.y - ty) * 0.6;
        p.pressBoost = 1.2;
      } else {
        p.pressBoost = 1;
      }
    } else {
      p.pressBoost = 1;
    }

    [tx, ty] = s7KeepAwayFromGK(p, tx, ty);   // 青GKキャッチ中は距離を取る
    p.tgtX = tx; p.tgtY = ty;
    p.isActiveDF = active.includes(p);   // 集結半径の可視化用
  }
}

function s7UpdateRedDefense(dt) {
  S7.redThink -= dt;
  if (S7.redThink <= 0) {
    s7ComputeRedDefenseTargets();
    S7.redThink = S7_STRENGTH[S7.strengthIdx].think;
  }
  for (const p of s7RedDF) {
    moveToward(p, p.tgtX !== undefined ? p.tgtX : p.homeX,
                  p.tgtY !== undefined ? p.tgtY : p.homeY,
                  s7RedSpeed(DF_SPEED) * s7SpeedMult(p) * (p.pressBoost || 1), dt);
  }
  s7RedFWDefend(dt);
}

// 赤の前線FWの守備: 青のビルドアップ(自陣でのパス回し)には前からプレス、
// それ以外はハーフウェー付近で待って次の攻撃(カウンター)にそなえる
function s7RedFWDefend(dt) {
  const p = s7RedFW;
  let tx, ty;
  const d = Math.hypot(ball.x - p.x, ball.y - p.y);
  if (ball.y > S7F.h * 0.45 && d < 15) {
    tx = ball.x; ty = ball.y;
  } else {
    tx = Math.max(6, Math.min(S7F.w - 6, ball.x * 0.5 + S7F.w * 0.25));
    ty = S7F.h * 0.52;
  }
  [tx, ty] = s7KeepAwayFromGK(p, tx, ty);   // 青GKキャッチ中は距離を取る
  moveToward(p, tx, ty, s7RedSpeed(DF_SPEED) * s7SpeedMult(p), dt);
}

// ---------- しあいモード: 赤の攻撃 / 青の帰陣・守備 ----------

// 赤の攻撃時のポジション: 戦術エンジン(s7AttackSpot)を赤の向きで使い、
// 攻撃が深まるほどゴール幅へ絞り込んでペナルティエリアに押し寄せる
function s7RedAttackSpot(p) {
  let [tx, ty] = s7AttackSpot(p, 'red');
  // 攻撃の深さに応じたゴール幅へ絞り込み(赤のペナルティエリア圧を維持)
  const goalCx = S7F.w / 2;
  const deep = Math.max(0, Math.min(1, (ball.y - S7F.h * 0.5) / (S7F.h * 0.3)));
  const squeeze = p.role === 'DF' ? 0.3 : 0.45;
  tx = tx + (goalCx - tx) * deep * squeeze;
  tx = Math.max(1.5, Math.min(S7F.w - 1.5, tx));

  // ボール保持者からのパスコースが塞がっていたら、開くように左右へずれる
  const owner = ball.owner;
  if (owner && owner.team === 'red' && owner !== p) {
    if (s7RedLaneRisky(owner, { x: tx, y: ty })) {
      const shifts = [4, -4, 7, -7, 3, -3];
      for (const dx of shifts) {
        const candX = Math.max(1.5, Math.min(S7F.w - 1.5, tx + dx));
        if (!s7RedLaneRisky(owner, { x: candX, y: ty })) { tx = candX; break; }
      }
    }
  }
  return [tx, ty];
}

// 赤のパスコースが青に切られていないか(青チーム相手のコース判定)
function s7RedLaneRisky(from, to) {
  const blues = [...s7Blue, s7BlueGK];
  const abx = to.x - from.x, aby = to.y - from.y;
  const abLen2 = abx * abx + aby * aby || 1;
  for (const d of blues) {
    const apx = d.x - from.x, apy = d.y - from.y;
    let t = (apx * abx + apy * aby) / abLen2;
    t = Math.max(0, Math.min(1, t));
    const cx = from.x + abx * t, cy = from.y + aby * t;
    if (t > 0.08 && t < 0.97 && Math.hypot(d.x - cx, d.y - cy) < LANE_RISK_DIST) return true;
  }
  return false;
}

// パス先の選択: コースが空いていて距離が近め(飛行中にカットされにくい)の
// 前方(青ゴール側)の仲間を最優先する
function s7RedChoosePassTarget(p) {
  const dist = q => Math.hypot(q.x - p.x, q.y - p.y);
  const mates = s7RedOutfield.filter(q => q !== p);
  const forward = mates.filter(q => q.y > p.y + 2);
  const openForward = forward.filter(q => !s7RedLaneRisky(p, q));

  // ロングボール作戦: 距離に関係なく、空いている一番前の仲間へ放り込む
  if (s7TeamTactic('red') === 'long' && openForward.length > 0) {
    return openForward.reduce((a, b) => (b.y > a.y ? b : a));
  }

  // 空いている前方・15m以内 → いちばん前(ゴールに近い)の仲間へ
  const ofNear = openForward.filter(q => dist(q) < 15);
  if (ofNear.length > 0) return ofNear.reduce((a, b) => (b.y > a.y ? b : a));
  // 空いている前方が遠くにしかいない → いちばん近いものへ
  if (openForward.length > 0) return openForward.reduce((a, b) => (dist(b) < dist(a) ? b : a));
  // ときどき強引に縦パス(カットされるリスク込み)
  const fNear = forward.filter(q => dist(q) < 15);
  if (fNear.length > 0 && Math.random() < 0.35) {
    return fNear[Math.floor(Math.random() * fNear.length)];
  }
  // 横・後ろへの安全なつなぎ(近い順)
  const openNear = mates.filter(q => !s7RedLaneRisky(p, q) && dist(q) < 15);
  if (openNear.length > 0) return openNear.reduce((a, b) => (dist(b) < dist(a) ? b : a));
  return mates.reduce((a, b) => (dist(b) < dist(a) ? b : a));
}

// 詰められた時の緊急パス先: 前方または横(自分より1m以上後ろは対象外)の
// あいている味方だけに限定する。後ろへの逃げパスは狙って奪われやすいので選ばない
function s7RedChooseEscapeTarget(p) {
  const dist = q => Math.hypot(q.x - p.x, q.y - p.y);
  const mates = s7RedOutfield.filter(q => q !== p && q.y > p.y - 1);
  const open = mates.filter(q => !s7RedLaneRisky(p, q));
  if (open.length === 0) return null;
  // 前にいる味方を優先。同程度ならより近い方
  const forwardOpen = open.filter(q => q.y > p.y + 1);
  const pool = forwardOpen.length > 0 ? forwardOpen : open;
  return pool.reduce((a, b) => (dist(b) < dist(a) ? b : a));
}

function s7UpdateRedAttack(dt) {
  const T = S7_TACTIC_PARAMS[s7TeamTactic('red')];
  for (const p of s7RedOutfield) {
    let tx, ty;
    let speed = s7RedSpeed(DF_SPEED);
    if (ball.owner === p) {
      // ドリブルで前進(深い位置ではゴールへ向かう)しつつ、時間が来たらパスかシュート
      p.holdTimer += dt;
      const goalCx = S7F.w / 2;

      // 詰めてくる相手を検出
      let presser = null, pd = Infinity;
      for (const b of s7Blue) {
        const d = Math.hypot(b.x - p.x, b.y - p.y);
        if (d < pd) { pd = d; presser = b; }
      }
      const pressured = pd < 2.6;

      if (pressured && presser) {
        // 詰めてくる相手から横へかわしながら少しだけ前進する(棒立ちで奪われない)
        const awayX = p.x - presser.x;
        const away = Math.abs(awayX) < 0.3 ? (p.x < goalCx ? -1 : 1) : Math.sign(awayX);
        tx = Math.max(1.5, Math.min(S7F.w - 1.5, p.x + away * 3));
        ty = p.y + 1.5;
      } else if (p.y > S7F.h * 0.6) {
        tx = p.x + (goalCx - p.x) * 0.4; ty = p.y + 2;
      } else {
        tx = p.x; ty = p.y + 2;
      }

      let limit = p.holdLimit;
      if (p.y > S7F.h - 16) limit = Math.min(limit, 0.55);
      if (pressured) limit = Math.min(limit, 0.35);
      if (p.holdTimer >= limit) {
        if (p.y > S7F.h - 11) {
          // ゴールが近い: シュート(遠すぎる位置からは撃たず、届く距離まで運ぶ)
          const aimX = goalCx + (Math.random() * 2 - 1) * (S7F.goalW / 2 - 0.5);
          versusShoot(p, aimX, S7F.h, p.isAce ? 1.25 : 1);
        } else if (pressured) {
          // 詰められている: 前方・横のあいている味方だけに逃がす(後ろへは出さない)
          const escape = s7RedChooseEscapeTarget(p);
          if (escape) {
            s7Pass(p, escape);
          } else {
            // 安全な逃げ場がない: パスせず、詰めてくる相手をかわし続ける
            p.holdTimer = Math.max(0, limit - 0.2);
          }
        } else {
          // プレッシャーがないとき: 前方に良いコース(あいている味方)があればパス、
          // なければパスせずキーパーに迫って前進を続ける(行けるときは前進を優先)
          const target = s7RedChoosePassTarget(p);
          const goodForward = target && target.y > p.y + 2 && !s7RedLaneRisky(p, target);
          if (goodForward) {
            s7Pass(p, target);
          } else {
            p.holdTimer = 0;   // 前進を続ける
          }
        }
      }
    } else if (ball.receiver === p && !ball.owner) {
      tx = ball.x + ball.vx * 0.2;
      ty = ball.y + ball.vy * 0.2;
    } else if (!ball.owner && !ball.receiver) {
      let nearest = null, nd = Infinity;
      for (const q of s7RedOutfield) {
        const d = Math.hypot(ball.x - q.x, ball.y - q.y);
        if (d < nd) { nd = d; nearest = q; }
      }
      if (nearest === p) { tx = ball.x; ty = ball.y; }
    }
    if (tx === undefined) {
      // パス&ムーブ: パスした選手がすぐ前(青ゴール側)へ走り込む
      if (T.giveGo && p === S7.giveGoP && S7.giveGoT > 0) {
        ty = Math.min(S7F.h - 4, ball.y + 8);
        tx = Math.max(1.5, Math.min(S7F.w - 1.5, p.x + (ball.x - p.x) * 0.3));
        speed = s7RedSpeed(DF_SPEED) * 1.25;
      }
      // 中央突破: FWの裏抜けラン
      if (tx === undefined && T.runs && p.role === 'FW') {
        const run = s7UpdateRun(p, dt, 'red');
        if (run) { [tx, ty] = run; speed = s7RedSpeed(DF_SPEED) * 1.2; }
      }
      if (tx === undefined) [tx, ty] = s7RedAttackSpot(p);
      // カウンター: 奪った直後の数秒間、FWは全力で駆け上がる
      if (T.sprint && p.role === 'FW' && S7.redCounterT > 0) speed = s7RedSpeed(DF_SPEED) * 1.25;
    }
    moveToward(p, tx, ty, speed * s7SpeedMult(p), dt);
  }
}

// 青の守備時の基準位置(役割ごとの横一列ライン。守備作戦でラインの高さが変わる)
function s7BlueDefBase(p) {
  const lines = S7_DEF_TACTICS[S7.blueDefTacticIdx].lines;
  return [p.baseX, S7F.h * lines[p.role]];
}

// 青の守備(集結半径ベース): 守備基準位置がボールから「まもりの はんけい」内に
// あるAIだけが反応し、プレス役1人+カバー役1人がボールへ。残りはラインに戻って守る
function s7UpdateBlueDefense(dt) {
  const radius = s7BlueGatherRadius();
  const aiBlues = s7Blue.filter(p => p !== controlledPlayer);

  const active = aiBlues.filter(p => {
    const [bx, by] = s7BlueDefBase(p);
    return Math.hypot(ball.x - bx, ball.y - by) < radius;
  });
  let presser = null, pd = Infinity;
  for (const p of active) {
    const d = Math.hypot(ball.x - p.x, ball.y - p.y);
    if (d < pd) { pd = d; presser = p; }
  }
  let cover = null, cd = Infinity;
  for (const p of active) {
    if (p === presser) continue;
    const d = Math.hypot(ball.x - p.x, ball.y - p.y);
    if (d < cd) { cd = d; cover = p; }
  }

  // フリーボールはいちばん近いAIが拾いに行く
  let nearest = null, nd = Infinity;
  for (const q of aiBlues) {
    const d = Math.hypot(ball.x - q.x, ball.y - q.y);
    if (d < nd) { nd = d; nearest = q; }
  }

  for (const p of aiBlues) {
    let tx, ty;
    let sprint = false;
    if (!ball.owner && !ball.receiver && nearest === p) {
      tx = ball.x; ty = ball.y;
    } else if (p === presser) {
      tx = ball.x; ty = ball.y;
    } else if (p === cover) {
      // カバー役: ボールと自ゴール(下)の間に立つ
      const gx = S7F.w / 2, gy = S7F.h;
      const dx = gx - ball.x, dy = gy - ball.y;
      const len = Math.hypot(dx, dy) || 1;
      tx = ball.x + dx / len * 2.8;
      ty = ball.y + dy / len * 2.8;
    } else {
      // 素早く自陣の守備ラインに戻る(DF/MF/FWの横一列)
      const [bx, by] = s7BlueDefBase(p);
      tx = bx + (ball.x - bx) * 0.25;
      ty = by + (ball.y - by) * 0.1;
      sprint = Math.hypot(tx - p.x, ty - p.y) > 6;
    }

    // さいきょうDF: あいてがハーフラインを超えたら積極的にボールへ寄せ、
    // ペナルティエリアに入ったら急速に詰める(通常のライン復帰より優先)
    let pressBoost = 1;
    if (p.isHelper) {
      if (ball.y > S7F.h - 7) {
        tx = ball.x; ty = ball.y;
        pressBoost = 1.5;
      } else if (ball.y > S7F.h / 2) {
        tx = tx + (ball.x - tx) * 0.6;
        ty = ty + (ball.y - ty) * 0.6;
        pressBoost = 1.2;
      }
    }

    [tx, ty] = s7KeepAwayFromGK(p, tx, ty);   // 赤GKキャッチ中は距離を取る
    moveToward(p, tx, ty, (sprint ? AI_SPEED * 1.25 : AI_SPEED) * s7SpeedMult(p) * pressBoost, dt);
  }
}

function s7Update(dt) {
  if (S7.state !== 'play') {
    S7.timer -= dt;
    if (S7.timer <= 0) {
      s7Kickoff(S7.nextKickoff);
      S7.state = 'play';
    }
    s7UpdateCam(dt);
    return;
  }

  if (S7.stealCooldown > 0) S7.stealCooldown -= dt;
  if (S7.blueCounterT > 0) S7.blueCounterT -= dt;
  if (S7.redCounterT > 0) S7.redCounterT -= dt;
  if (S7.giveGoT > 0) S7.giveGoT -= dt;

  // ユーザー入力(ボールを持っている青選手を直接操作する)
  let ix = 0, iy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) ix -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) ix += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) iy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) iy += 1;
  if (stick.active) { ix += stick.dx; iy += stick.dy; }
  if (tilt.enabled && tilt.beta0 !== null) {
    ix += tiltAxis(tilt.gamma - tilt.gamma0);
    iy += tiltAxis(tilt.beta - tilt.beta0);
  }
  const ilen = Math.hypot(ix, iy);
  if (ilen > 0.01) {
    const n = Math.min(1, ilen);
    // スーパーエース/きょうりょくDFを操作しているときは走りも速い
    const uSpd = PLAYER_SPEED * s7SpeedMult(controlledPlayer);
    controlledPlayer.vx = ix / ilen * uSpd * n;
    controlledPlayer.vy = iy / ilen * uSpd * n;
    controlledPlayer.fx = ix / ilen; controlledPlayer.fy = iy / ilen;
  } else {
    controlledPlayer.vx = 0; controlledPlayer.vy = 0;
  }

  // AI: ボールを保持しているチームが攻撃、相手は守備(攻守の切り替え)
  if (S7.attacker === 'blue') {
    for (const p of s7Blue) {
      if (p === controlledPlayer) continue;
      s7AttackAI(p, dt);
    }
  } else {
    s7UpdateBlueDefense(dt);
  }
  s7BlueGKAI(dt);
  s7RedGKAI(dt);
  if (S7.attacker === 'red') s7UpdateRedAttack(dt);
  else s7UpdateRedDefense(dt);

  // 移動 + コート内クランプ
  for (const p of s7All) {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.x = Math.max(p.radius, Math.min(S7F.w - p.radius, p.x));
    p.y = Math.max(p.radius, Math.min(S7F.h - p.radius, p.y));
  }

  // ボール
  if (ball.kickCooldown > 0) ball.kickCooldown -= dt;
  const goalCx = S7F.w / 2;

  if (ball.owner) {
    const o = ball.owner;
    ball.x = o.x + o.fx * 0.75;
    ball.y = o.y + o.fy * 0.75;
    ball.vx = 0; ball.vy = 0;

    // 奪い合い: 相手チームの選手がボールに近づいたら奪う(直後の奪い返しは少しの間できない)
    // さいきょうディフェンダーは奪える範囲が広い
    if (!o.isGK && S7.stealCooldown <= 0) {
      const stealers = o.team === 'blue' ? [...s7RedOutfield, s7RedGK] : [...s7Blue, s7BlueGK];
      for (const d of stealers) {
        const dist = Math.hypot(ball.x - d.x, ball.y - d.y);
        if (dist < STEAL_DIST * (d.isHelper ? 1.6 : 1)) {
          s7GiveBall(d);
          S7.stealCooldown = 0.8;
          break;
        }
      }
    }
  } else {
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;
    const damp = Math.pow(0.35, dt);
    ball.vx *= damp; ball.vy *= damp;

    // 上のゴール(青の得点)
    if (ball.y < ball.radius) {
      if (Math.abs(ball.x - goalCx) < S7F.goalW / 2) { s7Goal(); return; }
      ball.y = ball.radius; ball.vy *= -0.6;
    }
    // 下のゴール(赤の得点)
    if (ball.y > S7F.h - ball.radius) {
      if (Math.abs(ball.x - goalCx) < S7F.goalW / 2) { s7RedGoal(); return; }
      ball.y = S7F.h - ball.radius; ball.vy *= -0.6;
    }
    if (ball.x < ball.radius)         { ball.x = ball.radius;         ball.vx *= -0.6; }
    if (ball.x > S7F.w - ball.radius) { ball.x = S7F.w - ball.radius; ball.vx *= -0.6; }

    // ボールを拾う判定(さいきょうディフェンダー・スーパーGKは範囲が広い)
    for (const p of s7All) {
      if (p === ball.lastKicker && ball.kickCooldown > 0) continue;
      const d = Math.hypot(ball.x - p.x, ball.y - p.y);
      const mult = p.isHelper ? 1.35 : (p.isSuperGK ? 1.3 : 1);
      if (d < CAPTURE_DIST * mult) { s7GiveBall(p); break; }
    }
  }

  s7UpdateCam(dt);
}

// ---------- しあいモード: カメラ ----------
function s7UpdateCam(dt) {
  // ボールをなめらかに追いかける(急に動かさない)
  const k = Math.min(1, dt * 3.5);
  S7.cam.x += (ball.x - S7.cam.x) * k;
  S7.cam.y += (ball.y - S7.cam.y) * k;
}

function s7ApplyCamera() {
  const cw = window.innerWidth, ch = window.innerHeight;
  const scale = Math.max(cw, ch) / S7.viewLong;
  const halfW = cw / (2 * scale), halfH = ch / (2 * scale);
  const m = 1.5;   // コートの外が見えてよい余白
  const cx = Math.max(halfW - m, Math.min(S7F.w - halfW + m, S7.cam.x));
  const cy = Math.max(halfH - m, Math.min(S7F.h - halfH + m, S7.cam.y));
  view.scale = scale;
  view.offX = cw / 2 - cx * scale;
  view.offY = ch / 2 - cy * scale;
}

// 目標地点へ移動する(近づいたら減速)
function moveToward(p, tx, ty, maxSpeed, dt) {
  const dx = tx - p.x, dy = ty - p.y;
  const dist = Math.hypot(dx, dy);
  if (dist > 0.15) {
    const speed = Math.min(maxSpeed, dist * 3.0);
    p.vx = dx / dist * speed;
    p.vy = dy / dist * speed;
    p.fx = dx / dist; p.fy = dy / dist;
  } else {
    p.vx = 0; p.vy = 0;
  }
}

// ---------- AI ----------
function updateAI(p, dt) {
  let tx = p.x, ty = p.y;

  if (ball.owner === p) {
    // ボール保持中: 少し前(ゴール方向)へ運びながら、時間が来たらパスかシュート
    p.holdTimer += dt;
    tx = p.x; ty = p.y - 1.5;
    if (p.holdTimer >= p.holdLimit) {
      if (p.y < 10) {
        // ゴールが近ければシュート
        const goalCx = FIELD.w / 2;
        const aimX = goalCx + (Math.random() * 2 - 1) * (FIELD.goalW / 2 - 0.5);
        shootBall(p, aimX);
      } else {
        const targets = players.filter(q => q !== p);
        const to = targets[Math.floor(Math.random() * targets.length)];
        passBall(p, to);
      }
    }
  } else if (ball.receiver === p && !ball.owner) {
    // 自分あてのパス: ボールを迎えに行く
    tx = ball.x + ball.vx * 0.2;
    ty = ball.y + ball.vy * 0.2;
  } else if (!ball.owner && !ball.receiver) {
    // フリーボール: いちばん近いAIが拾いに行く
    let nearest = null, nd = Infinity;
    for (const q of players) {
      if (q === controlledPlayer) continue;
      const d = Math.hypot(ball.x - q.x, ball.y - q.y);
      if (d < nd) { nd = d; nearest = q; }
    }
    if (nearest === p) { tx = ball.x; ty = ball.y; }
    else { [tx, ty] = supportSpot(p); }
  } else {
    // だれかが持っている: サポートポジションへ
    [tx, ty] = supportSpot(p);
  }

  moveToward(p, tx, ty, AI_SPEED, dt);
}

// ---------- 敵チームAI ----------
function updateDefense(dt) {
  const goalCx = FIELD.w / 2;

  // GK: シュート中は着地点を予測、それ以外はボールの横位置についていく
  const gk = defenders.find(d => d.isGK);
  let targetX = ball.x;
  if (ball.isShot && !ball.owner && ball.vy < -0.01) {
    const t = (gk.y - ball.y) / ball.vy;
    if (t > 0) targetX = ball.x + ball.vx * t;
  }
  const postPad = gk.radius * 0.4;  // ポストぎりぎりまで反応できるように余白を最小限に
  const gtx = Math.max(goalCx - FIELD.goalW / 2 + postPad,
              Math.min(goalCx + FIELD.goalW / 2 - postPad, targetX));
  moveToward(gk, gtx, 1.2, GK_SPEED, dt);

  // フィールドDF: ボールに一番近い1人がプレス、残りは攻撃側をマーク
  const dfs = defenders.filter(d => !d.isGK);
  let presser = null, pd = Infinity;
  for (const d of dfs) {
    const dd = Math.hypot(ball.x - d.x, ball.y - d.y);
    if (dd < pd) { pd = dd; presser = d; }
  }
  const marks = players.filter(p => ball.owner !== p);
  let mi = 0;
  for (const d of dfs) {
    if (d === presser) {
      moveToward(d, ball.x, ball.y, DF_SPEED, dt);
    } else {
      // マーク相手とゴールの間に立つ
      const m = marks[mi++ % marks.length];
      const tx = m.x + (goalCx - m.x) * 0.3;
      const ty = m.y + (0 - m.y) * 0.3;
      moveToward(d, tx, ty, DF_SPEED, dt);
    }
  }
}

function supportSpot(p) {
  // ボールを基準に左右へ開いて、少しゴール寄りに構える
  const ai = players.filter(q => q !== controlledPlayer);
  const idx = ai.indexOf(p);
  const side = idx === 0 ? -1 : 1;
  let tx = ball.x + side * 5.5;
  let ty = ball.y - 4.5;
  const m = 1.5;
  tx = Math.max(m, Math.min(FIELD.w - m, tx));
  ty = Math.max(m, Math.min(FIELD.h - m, ty));
  return [tx, ty];
}

// ---------- 更新 ----------
function update(dt) {
  // ゴール/ロスト演出中は止めて、時間が来たらリスタート
  if (game.state !== 'play') {
    game.timer -= dt;
    if (game.timer <= 0) {
      if (game.state === 'goal') setupKickoff();
      else setupBacklineRestart();
      game.state = 'play';
    }
    return;
  }

  // プレイヤー入力
  let ix = 0, iy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) ix -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) ix += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) iy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) iy += 1;
  if (stick.active) { ix += stick.dx; iy += stick.dy; }
  if (tilt.enabled && tilt.beta0 !== null) {
    ix += tiltAxis(tilt.gamma - tilt.gamma0);  // 左右のかたむき
    iy += tiltAxis(tilt.beta - tilt.beta0);    // 前後のかたむき(奥にたおす=上へ)
  }

  const ilen = Math.hypot(ix, iy);
  if (ilen > 0.01) {
    const n = Math.min(1, ilen);
    controlledPlayer.vx = ix / ilen * PLAYER_SPEED * n;
    controlledPlayer.vy = iy / ilen * PLAYER_SPEED * n;
    controlledPlayer.fx = ix / ilen; controlledPlayer.fy = iy / ilen;
  } else {
    controlledPlayer.vx = 0; controlledPlayer.vy = 0;
  }

  // AI
  for (const p of players) {
    if (p !== controlledPlayer) updateAI(p, dt);
  }
  updateDefense(dt);

  // 選手の移動 + フィールド内にとどめる
  for (const p of everyone) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.x = Math.max(p.radius, Math.min(FIELD.w - p.radius, p.x));
    p.y = Math.max(p.radius, Math.min(FIELD.h - p.radius, p.y));
  }

  // ボール
  if (ball.kickCooldown > 0) ball.kickCooldown -= dt;

  if (ball.owner) {
    // ドリブル: 持ち主の少し前に付ける
    const o = ball.owner;
    ball.x = o.x + o.fx * 0.75;
    ball.y = o.y + o.fy * 0.75;
    ball.vx = 0; ball.vy = 0;

    // 敵に近づきすぎるとボールを奪われる
    for (const d of defenders) {
      const dist = Math.hypot(ball.x - d.x, ball.y - d.y);
      if (dist < STEAL_DIST) {
        loseBall(d.isGK ? 'save' : 'steal');
        return;
      }
    }
  } else {
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;
    // 摩擦
    const damp = Math.pow(0.35, dt);
    ball.vx *= damp;
    ball.vy *= damp;

    // ゴールライン(上)に到達: ゴール判定
    if (ball.y < ball.radius) {
      const goalCx = FIELD.w / 2;
      if (Math.abs(ball.x - goalCx) < FIELD.goalW / 2) {
        onGoal();
        return;
      }
      if (ball.isShot) {
        loseBall('miss');
        return;
      }
    }

    // 壁で軽くバウンド
    if (ball.x < ball.radius)           { ball.x = ball.radius;           ball.vx *= -0.6; }
    if (ball.x > FIELD.w - ball.radius) { ball.x = FIELD.w - ball.radius; ball.vx *= -0.6; }
    if (ball.y < ball.radius)           { ball.y = ball.radius;           ball.vy *= -0.6; }
    if (ball.y > FIELD.h - ball.radius) { ball.y = FIELD.h - ball.radius; ball.vy *= -0.6; }

    // 敵がフリーボール/パスをカット
    for (const d of defenders) {
      const dist = Math.hypot(ball.x - d.x, ball.y - d.y);
      if (dist < INTERCEPT_DIST) {
        const wasPass = ball.receiver !== null;
        loseBall(d.isGK ? 'save' : (wasPass ? 'passCut' : 'steal'));
        return;
      }
    }

    // 味方がボールを拾う判定
    for (const p of players) {
      if (p === ball.lastKicker && ball.kickCooldown > 0) continue;
      const d = Math.hypot(ball.x - p.x, ball.y - p.y);
      if (d < CAPTURE_DIST) { giveBall(p); break; }
    }
  }
}

// ---------- 描画 ----------
function drawField() {
  const cw = window.innerWidth, ch = window.innerHeight;

  // 背景(フィールド外)
  ctx.fillStyle = '#15571f';
  ctx.fillRect(0, 0, cw, ch);

  const [x0, y0] = toScreen(0, 0);
  const [x1, y1] = toScreen(FIELD.w, FIELD.h);
  const s = view.scale;

  // 芝生ストライプ
  const stripes = 8;
  for (let i = 0; i < stripes; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#2e9e44' : '#28903c';
    const sy = y0 + (y1 - y0) * (i / stripes);
    const sh = (y1 - y0) / stripes;
    ctx.fillRect(x0, sy, x1 - x0, sh + 1);
  }

  // ライン
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = Math.max(2, s * 0.08);
  ctx.strokeRect(x0, y0, x1 - x0, y1 - y0);

  // ハーフウェーライン + センターサークル
  const [, hy] = toScreen(0, FIELD.h / 2);
  ctx.beginPath();
  ctx.moveTo(x0, hy);
  ctx.lineTo(x1, hy);
  ctx.stroke();
  const [ccx, ccy] = toScreen(FIELD.w / 2, FIELD.h / 2);
  ctx.beginPath();
  ctx.arc(ccx, ccy, 3 * s, 0, Math.PI * 2);
  ctx.stroke();

  // ペナルティエリア(上=ゴール側)
  const paW = 12, paH = 5;
  const [pax, pay] = toScreen((FIELD.w - paW) / 2, 0);
  ctx.strokeRect(pax, pay, paW * s, paH * s);

  // ゴール(上のライン外側)
  const [gx, gy] = toScreen((FIELD.w - FIELD.goalW) / 2, 0);
  const goalDepth = 1.1 * s;
  ctx.fillStyle = '#f5f5f5';
  ctx.fillRect(gx, gy - goalDepth, FIELD.goalW * s, goalDepth);
  ctx.strokeStyle = '#cccccc';
  ctx.lineWidth = 1.5;
  // ネットっぽい縦線
  for (let i = 1; i < 8; i++) {
    const nx = gx + FIELD.goalW * s * (i / 8);
    ctx.beginPath();
    ctx.moveTo(nx, gy - goalDepth);
    ctx.lineTo(nx, gy);
    ctx.stroke();
  }
}

// たいせんモード専用: 下側のゴール(れんしゅうモードでは呼ばない)
function drawBottomGoal() {
  const s = view.scale;
  const [pax, pay] = toScreen((FIELD.w - 12) / 2, FIELD.h - 5);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = Math.max(2, s * 0.08);
  ctx.strokeRect(pax, pay, 12 * s, 5 * s);

  const [gx, gy] = toScreen((FIELD.w - FIELD.goalW) / 2, FIELD.h);
  const goalDepth = 1.1 * s;
  ctx.fillStyle = '#f5f5f5';
  ctx.fillRect(gx, gy, FIELD.goalW * s, goalDepth);
  ctx.strokeStyle = '#cccccc';
  ctx.lineWidth = 1.5;
  for (let i = 1; i < 8; i++) {
    const nx = gx + FIELD.goalW * s * (i / 8);
    ctx.beginPath();
    ctx.moveTo(nx, gy);
    ctx.lineTo(nx, gy + goalDepth);
    ctx.stroke();
  }
}

function drawPlayer(p) {
  const [sx, sy] = toScreen(p.x, p.y);
  const r = p.radius * view.scale;

  // 影
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(sx, sy + r * 0.55, r * 0.9, r * 0.4, 0, 0, Math.PI * 2);
  ctx.fill();

  // ボール保持者の黄色いリング
  if (ball.owner === p) {
    ctx.strokeStyle = '#ffe14d';
    ctx.lineWidth = Math.max(2.5, r * 0.22);
    ctx.beginPath();
    ctx.arc(sx, sy, r * 1.45, 0, Math.PI * 2);
    ctx.stroke();
  }

  // 自分がボール保持中(青GKのキャッチ中も) → 味方に「パスできるよ」の点滅リング
  if ((ball.owner === controlledPlayer || (MATCH.mode === 's7' && ball.owner === s7BlueGK)) &&
      p !== ball.owner && p.team === 'blue' && !p.isGK) {
    const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 250);
    ctx.strokeStyle = `rgba(255,255,255,${0.35 + 0.45 * pulse})`;
    ctx.lineWidth = 2.5;
    ctx.setLineDash([6, 5]);
    ctx.beginPath();
    ctx.arc(sx, sy, r * (1.7 + 0.25 * pulse), 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // からだ(むらさき=じぶん / あお=みかた / あか=てき / オレンジ=キーパー)
  let bodyFill, bodyStroke;
  if (p === controlledPlayer) { bodyFill = '#a44dff'; bodyStroke = '#6a1fc4'; }
  else if (p.isGK)           { bodyFill = '#ff9f1a'; bodyStroke = '#b86a00'; }
  else if (p.team === 'red') { bodyFill = '#ff4d4d'; bodyStroke = '#b31f1f'; }
  else                       { bodyFill = '#2f7bff'; bodyStroke = '#1a4fb0'; }
  ctx.fillStyle = bodyFill;
  ctx.strokeStyle = bodyStroke;
  ctx.lineWidth = Math.max(2, r * 0.18);
  ctx.beginPath();
  ctx.arc(sx, sy, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // 向きのしるし
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(sx + p.fx * r * 0.55, sy + p.fy * r * 0.55, r * 0.28, 0, Math.PI * 2);
  ctx.fill();

  // スーパーエース(金のリング+星) / きょうりょくディフェンダー(水色のリング)
  if (p.isAce || p.isSuperGK) {
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = Math.max(2, r * 0.2);
    ctx.beginPath();
    ctx.arc(sx, sy, r * 1.25, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold ${Math.max(10, r * 0.9)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('★', sx, sy - r * 1.5);
  } else if (p.isHelper) {
    ctx.strokeStyle = '#7fe0ff';
    ctx.lineWidth = Math.max(2, r * 0.2);
    ctx.beginPath();
    ctx.arc(sx, sy, r * 1.25, 0, Math.PI * 2);
    ctx.stroke();
  } else if (p.isPasser) {
    ctx.strokeStyle = '#7dffb0';
    ctx.lineWidth = Math.max(2, r * 0.2);
    ctx.beginPath();
    ctx.arc(sx, sy, r * 1.25, 0, Math.PI * 2);
    ctx.stroke();
  }

  // 「じぶん」ラベル
  if (p === controlledPlayer) {
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold ${Math.max(11, view.scale * 0.55)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('じぶん', sx, sy - r * 2.0);
  }
}

function drawPassLanes() {
  if (ball.owner !== controlledPlayer) return;
  const [ux, uy] = toScreen(controlledPlayer.x, controlledPlayer.y);
  const alpha = judge.active ? 0.95 : 0.5;
  for (const p of players) {
    if (p === controlledPlayer) continue;
    const risky = laneIsRisky(controlledPlayer, p);
    const [sx, sy] = toScreen(p.x, p.y);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineWidth = judge.active ? 4 : 3;
    if (risky) {
      ctx.strokeStyle = '#ff5c5c';
      ctx.setLineDash([9, 7]);
    } else {
      ctx.strokeStyle = '#4ade80';
      ctx.setLineDash([]);
    }
    ctx.beginPath();
    ctx.moveTo(ux, uy);
    ctx.lineTo(sx, sy);
    ctx.stroke();
    ctx.restore();
  }
}

function drawSlowMoOverlay() {
  if (!judge.active) return;
  ctx.fillStyle = 'rgba(40,90,200,0.08)';
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
}

function drawJudgeTimer() {
  if (!judge.active) return;
  const [sx, sy] = toScreen(controlledPlayer.x, controlledPlayer.y);
  const r = controlledPlayer.radius * view.scale;
  const frac = judge.timer / JUDGE_TIME;

  ctx.save();
  ctx.strokeStyle = '#ffe14d';
  ctx.lineWidth = Math.max(3, r * 0.25);
  ctx.beginPath();
  ctx.arc(sx, sy, r * 2.1, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2);
  ctx.stroke();
  ctx.restore();

  ctx.textAlign = 'center';
  ctx.font = 'bold 18px sans-serif';
  ctx.lineWidth = 5;
  ctx.strokeStyle = 'rgba(0,0,0,0.7)';
  const label = 'はんだんタイム ' + Math.ceil(judge.timer);
  const ly = window.innerHeight - 230;

  ctx.arc(sx, sy, r * 0.35, 0, Math.PI * 2);

// 日本語は単語区切りが無いので1文字ずつ折り返す
function wrapText(text, cx, y, maxWidth, lineHeight) {
  let line = '';
  let ly = y;
  for (const ch of text) {
    const test = line + ch;
    if (line !== '' && ctx.measureText(test).width > maxWidth) {
      ctx.fillText(line, cx, ly);
      line = ch;
      ly += lineHeight;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, cx, ly);
}

// ---------- しあいモード: 描画 ----------
function s7DrawField() {
  const cw = window.innerWidth, ch = window.innerHeight;
  ctx.fillStyle = '#15571f';
  ctx.fillRect(0, 0, cw, ch);

  const [x0, y0] = toScreen(0, 0);
  const [x1, y1] = toScreen(S7F.w, S7F.h);
  const s = view.scale;

  // 芝生ストライプ
  const stripes = 12;
  for (let i = 0; i < stripes; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#2e9e44' : '#28903c';
    const sy = y0 + (y1 - y0) * (i / stripes);
    const sh = (y1 - y0) / stripes;
    ctx.fillRect(x0, sy, x1 - x0, sh + 1);
  }

  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = Math.max(2, s * 0.08);
  ctx.strokeRect(x0, y0, x1 - x0, y1 - y0);

  // ハーフウェーライン + センターサークル
  const [, hy] = toScreen(0, S7F.h / 2);
  ctx.beginPath();
  ctx.moveTo(x0, hy);
  ctx.lineTo(x1, hy);
  ctx.stroke();
  const [ccx, ccy] = toScreen(S7F.w / 2, S7F.h / 2);
  ctx.beginPath();
  ctx.arc(ccx, ccy, 5 * s, 0, Math.PI * 2);
  ctx.stroke();

  // ペナルティエリア(上下)
  const paW = 16, paH = 7;
  const [pax0, pay0] = toScreen((S7F.w - paW) / 2, 0);
  ctx.strokeRect(pax0, pay0, paW * s, paH * s);
  const [pax1, pay1] = toScreen((S7F.w - paW) / 2, S7F.h - paH);
  ctx.strokeRect(pax1, pay1, paW * s, paH * s);

  // ゴール(上下、ネット付き)
  const goalDepth = 1.3 * s;
  const [gx0, gy0] = toScreen((S7F.w - S7F.goalW) / 2, 0);
  ctx.fillStyle = '#f5f5f5';
  ctx.fillRect(gx0, gy0 - goalDepth, S7F.goalW * s, goalDepth);
  const [gx1, gy1] = toScreen((S7F.w - S7F.goalW) / 2, S7F.h);
  ctx.fillRect(gx1, gy1, S7F.goalW * s, goalDepth);
  ctx.strokeStyle = '#cccccc';
  ctx.lineWidth = 1.5;
  for (let i = 1; i < 10; i++) {
    const nx = gx0 + S7F.goalW * s * (i / 10);
    ctx.beginPath();
    ctx.moveTo(nx, gy0 - goalDepth); ctx.lineTo(nx, gy0);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(nx, gy1); ctx.lineTo(nx, gy1 + goalDepth);
    ctx.stroke();
  }
}

function s7DrawPassLanes() {
  const from = ball.owner === controlledPlayer ? controlledPlayer
             : (ball.owner === s7BlueGK ? s7BlueGK : null);
  if (!from) return;
  const [ux, uy] = toScreen(from.x, from.y);
  const alpha = judge.active ? 0.95 : 0.5;
  for (const p of s7Blue) {
    if (p === from) continue;
    const risky = s7LaneRisky(from, p);
    const [sx, sy] = toScreen(p.x, p.y);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineWidth = judge.active ? 4 : 3;
    if (risky) {
      ctx.strokeStyle = '#ff5c5c';
      ctx.setLineDash([9, 7]);
    } else {
      ctx.strokeStyle = '#4ade80';
      ctx.setLineDash([]);
    }
    ctx.beginPath();
    ctx.moveTo(ux, uy);
    ctx.lineTo(sx, sy);
    ctx.stroke();
    ctx.restore();
  }
}

function s7MinimapRect() {
  const mw = 96;
  const mh = mw * S7F.h / S7F.w;
  return [window.innerWidth - mw - 10, 70, mw, mh];
}

function s7DrawMinimap() {
  const [mx, my, mw, mh] = s7MinimapRect();

  ctx.fillStyle = 'rgba(0,40,10,0.72)';
  ctx.beginPath();
  ctx.roundRect(mx - 3, my - 3, mw + 6, mh + 6, 6);
  ctx.fill();
  // 自分がボール保持中はタップでパスできる合図として黄色いふちにする
  const canMapPass = (ball.owner === controlledPlayer || ball.owner === s7BlueGK) && S7.state === 'play';
  ctx.strokeStyle = canMapPass ? 'rgba(255,225,77,0.95)' : 'rgba(255,255,255,0.7)';
  ctx.lineWidth = canMapPass ? 2.2 : 1.2;
  ctx.strokeRect(mx, my, mw, mh);
  if (canMapPass) {
    ctx.fillStyle = 'rgba(255,225,77,0.95)';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('タップでパス!', mx + mw / 2, my + mh + 14);
  }
  // ハーフウェーライン + 両ゴール
  ctx.beginPath();
  ctx.moveTo(mx, my + mh / 2);
  ctx.lineTo(mx + mw, my + mh / 2);
  ctx.stroke();
  const gw = mw * S7F.goalW / S7F.w;
  ctx.fillStyle = '#f5f5f5';
  ctx.fillRect(mx + (mw - gw) / 2, my - 2, gw, 2);
  ctx.fillRect(mx + (mw - gw) / 2, my + mh, gw, 2);

  const dot = (p, color, r) => {
    const dx = mx + p.x / S7F.w * mw;
    const dy = my + p.y / S7F.h * mh;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(dx, dy, r, 0, Math.PI * 2);
    ctx.fill();
  };
  for (const p of s7Blue) {
    if (p === controlledPlayer) continue;
    dot(p, '#4d94ff', 2.4);
  }
  dot(s7BlueGK, '#ffb340', 2.4);
  for (const p of s7RedOutfield) dot(p, '#ff5c5c', 2.2);
  dot(s7RedGK, '#ffb340', 2.4);
  // 操作中の選手(目立つ色+白ふち)
  {
    const p = controlledPlayer;
    const dx = mx + p.x / S7F.w * mw;
    const dy = my + p.y / S7F.h * mh;
    ctx.fillStyle = '#c470ff';
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(dx, dy, 3.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }
  // ボール
  {
    const dx = mx + ball.x / S7F.w * mw;
    const dy = my + ball.y / S7F.h * mh;
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#333333';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(dx, dy, 2.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }
}

function s7DrawZoneAreas() {
  if (!S7.showAreas) return;
  const s = view.scale;
  const rowY = [0, S7F.h * 0.25, S7F.h * 0.5];
  ctx.save();
  for (let row = 0; row < 2; row++) {
    for (let col = 0; col < 3; col++) {
      const [x0, y0] = toScreen(S7_AREA_W * col, rowY[row]);
      const w = S7_AREA_W * s, h = (rowY[row + 1] - rowY[row]) * s;
      ctx.fillStyle = (row + col) % 2 === 0 ? 'rgba(255,90,90,0.10)' : 'rgba(255,90,90,0.05)';
      ctx.fillRect(x0, y0, w, h);
    }
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([8, 6]);
  for (let col = 1; col < 3; col++) {
    const [x0, y0] = toScreen(S7_AREA_W * col, 0);
    const [, y1] = toScreen(0, S7F.h * 0.5);
    ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x0, y1); ctx.stroke();
  }
  for (let row = 1; row < 3; row++) {
    const [x0, y0] = toScreen(0, rowY[row]);
    const [x1] = toScreen(S7F.w, 0);
    ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y0); ctx.stroke();
  }
  ctx.restore();
}
