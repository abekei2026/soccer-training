    if (S7.descMode === 'def') {
      const t = S7_DEF_TACTICS[S7.blueDefTacticIdx];
      heading = '「' + t.label + '」(まもり) の せつめい';
      desc = S7_DEF_TACTIC_DESC[t.key];
    } else {
      const t = S7_TACTICS[S7.blueTacticIdx];
      heading = '「' + t.label + '」(こうげき) の せつめい';
      desc = S7_TACTIC_DESC[t.key];
    }
    ctx.fillStyle = '#ffe14d';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(heading, cx, dy2 + 18);
    ctx.fillStyle = '#ffffff';
    ctx.font = '12px sans-serif';
    wrapText(desc[0], cx, dy2 + 38, dw2 - 24, 16);
    ctx.fillStyle = '#8fffb0';
    wrapText(desc[1], cx, dy2 + 72, dw2 - 24, 16);
  }

  // ページ切り替え
  const [nbx, nby, nbw, nbh] = s7SetupNavRect();
  ctx.fillStyle = 'rgba(120,200,255,0.9)';
  ctx.beginPath();
  ctx.roundRect(nbx, nby, nbw, nbh, 10);
  ctx.fill();
  ctx.fillStyle = '#0a3550';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('つぎの せってい ▸', nbx + nbw / 2, nby + nbh / 2 + 5);

  const [sbx, sby, sbw, sbh] = s7StartMatchButtonRect();
  const pulse = 0.5 + 0.5 * Math.sin(performance.now() / 300);
  ctx.fillStyle = `rgba(150,255,170,${0.85 + 0.15 * pulse})`;
  ctx.beginPath();
  ctx.roundRect(sbx, sby, sbw, sbh, 14);
  ctx.fill();
  ctx.strokeStyle = '#1d5c2a';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.fillStyle = '#1d5c2a';
  ctx.font = 'bold 22px sans-serif';
  ctx.fillText('しあい スタート!', sbx + sbw / 2, sby + sbh / 2 + 8);

  const [lbx, lby, lbw, lbh] = s7SetupBackLinkRect();
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px sans-serif';
  ctx.fillText('タイトルへ もどる', lbx + lbw / 2, lby + lbh / 2 + 5);
}

function drawS7ResultScreen() {
  drawField();
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

  const cx = window.innerWidth / 2;
  ctx.textAlign = 'center';

  let title, titleColor;
  if (S7.score > S7.redScore) { title = 'かち!'; titleColor = '#ffe14d'; }
  else if (S7.score < S7.redScore) { title = 'まけ…'; titleColor = '#ffffff'; }
  else { title = 'ひきわけ'; titleColor = '#ffffff'; }

  ctx.font = 'bold 32px sans-serif';
  ctx.lineWidth = 7;
  ctx.strokeStyle = 'rgba(0,0,0,0.6)';
  ctx.strokeText(title, cx, window.innerHeight * 0.16);
  ctx.fillStyle = titleColor;
  ctx.fillText(title, cx, window.innerHeight * 0.16);

  ctx.font = 'bold 20px sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('あなた ' + S7.score + ' - ' + S7.redScore + ' あいて', cx, window.innerHeight * 0.26);

  ctx.font = '14px sans-serif';
  ctx.fillStyle = '#cccccc';
  ctx.fillText('さくせん: ' + S7_TACTICS[S7.blueTacticIdx].label +
               ' / あいて: ' + (S7_TACTICS.find(t => t.key === S7.redTacticKey) || S7_TACTICS[0]).label +
               ' / ' + S7_STRENGTH[S7.strengthIdx].label, cx, window.innerHeight * 0.32);

  const [rbx, rby, rbw, rbh] = replayButtonRect();
  ctx.fillStyle = 'rgba(255,225,77,0.92)';
  ctx.beginPath();
  ctx.roundRect(rbx, rby, rbw, rbh, 14);
  ctx.fill();
  ctx.strokeStyle = '#553c00';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.fillStyle = '#553c00';
  ctx.font = 'bold 20px sans-serif';
  ctx.fillText('もういちど あそぶ', rbx + rbw / 2, rby + rbh / 2 + 7);

  const [tbx, tby, tbw, tbh] = titleLinkRect();
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px sans-serif';
  ctx.fillText('タイトルへ もどる', tbx + tbw / 2, tby + tbh / 2 + 5);
}

function s7Draw() {
  s7ApplyCamera();
  s7DrawField();
  s7DrawZoneAreas();
  s7DrawGatherRadius();
  s7DrawPassLanes();
  drawBall();
  const sorted = [...s7All].sort((a, b) => a.y - b.y);
  for (const p of sorted) drawPlayer(p);
  if (ball.owner) drawBall();
  drawSlowMoOverlay();
  drawStick();
  s7DrawHUD();
  s7DrawScore();
  drawSettingsButton();
  drawJudgeTimer();
  s7DrawMinimap();
  s7DrawCenterMessage();
  s7DrawPauseMenu();
}

function draw() {
  Object.assign(view, fitView);   // しあいモード以外はフィールド全体表示に戻す
  if (APP.screen === 'title') { drawTitleScreen(); return; }
  if (APP.screen === 'timeSelect') { drawTimeSelectScreen(); return; }
  if (APP.screen === 'levelSelect') { drawLevelSelectScreen(); return; }
  if (APP.screen === 's7Setup') { drawS7SetupScreen(); return; }
  if (APP.screen === 'onlineMenu') { drawOnlineMenuScreen(); return; }
  if (APP.screen === 'onlineHost') { drawOnlineHostScreen(); return; }
  if (APP.screen === 'onlineJoinEntry') { drawOnlineJoinEntryScreen(); return; }
  if (APP.screen === 'onlineJoinConnecting') { drawOnlineJoinConnectingScreen(); return; }
  if (APP.screen === 'result') {
    if (MATCH.mode === 's7') { drawS7ResultScreen(); return; }
    if (MATCH.mode === 'versus') drawVersusResultScreen(); else drawResultScreen();
    return;
  }
  if (MATCH.mode === 's7') { s7Draw(); return; }
  if (MATCH.mode === 'versus') { drawVersusPlay(); return; }

  drawField();
  drawPassLanes();
  drawBall();
  // 下にいる選手を手前に描く
  const sorted = [...everyone].sort((a, b) => a.y - b.y);
  for (const p of sorted) drawPlayer(p);
  if (ball.owner) drawBall();  // 保持中はボールを選手より手前に
  drawSlowMoOverlay();
  drawStick();
  drawHUD();
  drawScore();
  drawRoundTimer();
  drawSettingsButton();
  drawJudgeTimer();
  drawCenterMessage();
  drawPracticeSettingsMenu();
}

// 判断タイムの終了時、開いていたコースを使わなかったらヒントを出す(頻度は控えめ)
function maybeShowOpenLaneHint() {
  if (!judge.enabled || ball.owner !== controlledPlayer) return;
  const now = performance.now();
  if (now - lastHintAt < HINT_COOLDOWN) return;
  const hasOpenLane = players.some(p => p !== controlledPlayer && !laneIsRisky(controlledPlayer, p));
  if (hasOpenLane) {
    showToast('そこ あいてたよ!');
    stats.hints++;
    lastHintAt = now;
  }
}

// ---------- ゲームループ ----------
let lastTime = performance.now();
function loop(now) {
  let rawDt = (now - lastTime) / 1000;
  lastTime = now;
  rawDt = Math.min(rawDt, 0.05);  // タブ復帰時などの大ジャンプを防ぐ

  if (APP.screen === 'play' && MATCH.mode === 's7') {
    if (!S7.paused) {
      S7.timeLeft -= rawDt;
      if (S7.timeLeft <= 0) {
        S7.timeLeft = 0;
        s7EndMatch();
      } else {
        if (judge.active) {
          judge.timer -= rawDt;
          if (judge.timer <= 0) {
            judge.timer = 0;
            judge.active = false;
          }
        }
        s7Update(rawDt * (judge.active ? SLOWMO_SCALE : 1));
      }
    }
  } else if (APP.screen === 'play' && MATCH.mode === 'versus') {
    if (ONLINE.role === 'guest') {
      // ゲストは自分でシミュレーションしない。入力だけホストへ送り、状態は受信してそのまま描画する
      onlineSendGuestInput(rawDt);
    } else if (!MATCH.paused) {
      MATCH.timeLeft -= rawDt;
      if (MATCH.timeLeft <= 0) {
        MATCH.timeLeft = 0;
        endVersusRound();
      } else {
        updateVersus(rawDt);
      }
      onlineBroadcastVersusState(rawDt);
    }
  } else if (APP.screen === 'play') {
    if (!game.paused) {
      roundTime -= rawDt;
      if (roundTime <= 0) {
        roundTime = 0;
        endRound();
      } else {
        if (judge.active) {
          judge.timer -= rawDt;
          if (judge.timer <= 0) {
            judge.timer = 0;
            judge.active = false;
            maybeShowOpenLaneHint();
          }
        }
        update(rawDt * (judge.active ? SLOWMO_SCALE : 1));
      }
    }
  }

  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
